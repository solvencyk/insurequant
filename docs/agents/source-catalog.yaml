dart_core4_metrics:
  - CSM Waterfall
  - 종목별 신계약 CSM
  - 당기순이익 분해 (보험손익/투자손익 high-level)
  - 재보험 관련 손익 (lower priority)

label_variations_per_company:
  현대: 계약의 유형
  KB: 보험료배분접근법
  삼성화재: [보장성, 물보험, 저축성]
