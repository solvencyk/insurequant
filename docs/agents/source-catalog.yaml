    name: KOSIS 손보사별 손해율
    orgId: 382
    tblId: TX_38202_A1561
  - id: F8
    name: 손보협회 비교공시
    url: https://consumer.knia.or.kr
    metrics: [채널별 불완전판매비율, 설계사정착률, 민원, 부지급률]
  - id: F9
    name: data.go.kr 추가
    api_ids: [15061306, 15061307, 15094797]
  - id: F10
    name: GA통합공시
    url: https://gapub.insure.or.kr
  - id: F14
    name: 규제 뉴스 피드
