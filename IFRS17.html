<script>
/* Chart common theme (DESIGN-V2 P2) */
(function(){
  const C=window.Chart;
  if(C){
    const cs=getComputedStyle(document.documentElement);
    const muted=cs.getPropertyValue('--muted').trim()||'#6c757d';
    const border=cs.getPropertyValue('--border').trim()||'#e9ecef';
    const font="'Pretendard Variable',Pretendard,ui-sans-serif,system-ui,'Segoe UI',sans-serif";
    C.defaults.font.family=font; C.defaults.font.size=12;
    C.defaults.color=muted; C.defaults.borderColor=border;
    C.defaults.plugins.tooltip.backgroundColor='rgba(33,37,41,0.9)';
    C.defaults.plugins.tooltip.titleColor='#ffffff';
    C.defaults.plugins.tooltip.bodyColor='#f8f9fa';
    C.defaults.plugins.tooltip.padding=10; C.defaults.plugins.tooltip.cornerRadius=6;
    C.defaults.plugins.tooltip.titleFont={family:font,size:12,weight:'600'};
    C.defaults.plugins.tooltip.bodyFont={family:font,size:12};
    C.defaults.scale.grid.color=border; C.defaults.scale.ticks.color=muted;
  }
  if(window.echarts){
    echarts.registerTheme('iq',{
      textStyle:{fontFamily:"'Pretendard Variable',Pretendard,sans-serif",fontSize:12,color:'#6c757d'},
      categoryAxis:{axisLine:{lineStyle:{color:'#e9ecef'}},splitLine:{lineStyle:{color:'#e9ecef'}},axisLabel:{color:'#6c757d'}},
      valueAxis:{axisLine:{lineStyle:{color:'#e9ecef'}},splitLine:{lineStyle:{color:'#e9ecef'}},axisLabel:{color:'#6c757d'}},
    });
  }
})();
(() => {
  function resolveUrl(relativePath) {
    return new URL(relativePath, window.location.href).href;
  }

  function dataPaths(repoRelative, templatesRelative) {
    return [resolveUrl(repoRelative), resolveUrl(templatesRelative)];
  }

  const PATHS = {
    wf: dataPaths("../data/dart/viz/csm_waterfall.json", "data/dart/viz/csm_waterfall.json"),
    wfx: dataPaths("CSM_waterfall.json", "data/dart/viz/CSM_waterfall.json"),
    amort: dataPaths("../data/dart/viz/csm_amort_schedule.json", "data/dart/viz/csm_amort_schedule.json"),
    pl: dataPaths("../data/dart/viz/insurance_pl_breakdown.json", "data/dart/viz/insurance_pl_breakdown.json"),
    sen: dataPaths("../data/dart/viz/sensitivity_heatmap.json", "data/dart/viz/sensitivity_heatmap.json"),
    nb: dataPaths("../data/ir/nb_csm_ratio.json", "data/ir/nb_csm_ratio.json"),
    hist: dataPaths("../data/dart/viz/csm_waterfall_history.json", "data/dart/viz/csm_waterfall_history.json"),
    plx: dataPaths("PL_breakdown.json", "data/dart/viz/PL_breakdown.json"),
    nbm: dataPaths("NB_CSM_multiple.json", "NB_CSM_multiple.json"),
  };

  const NB_LOOKUP = {
    삼성화재해상보험: { slug: "samsung_fire", bucket: "non_life" },
    현대해상: { slug: "hyundai_marine", bucket: "non_life" },
    DB손해보험: { slug: "db_insurance", bucket: "non_life" },
    KB손해보험: { slug: "kb_insurance", bucket: "non_life" },
    삼성생명: { slug: "samsung_life", bucket: "life" },
    한화생명: { slug: "hanwha_life", bucket: "life" },
  };

  const charts = { wf: null, amort: null, pl: null, nb: null, hist: null };

  const payload = { wf:null, amort:null, pl:null, sen:null, nb:null, hist:null, ni:null };
  const ix = {
    wfx: new Map(),
    amort: new Map(),
    pl: new Map(),
    sen: new Map(),
    hist: new Map(),
    plx: new Map(),
    nbm: new Map(),
  };
  // 회사코드(KR0001…) 기반 매칭. 새 마스터(CSM_waterfall.json)가 코드↔이름 등록부.
  const codeToName = {};   // 'KR0001' → '메리츠화재해상보험'
  const nbByCode = {};     // 'KR0008' → NB spec (boot에서 NB_LOOKUP를 코드로 재키잉)

  function parseKoNum(x){
    if (x == null) return null;
    if (x === "" || x === "-") return null;
    let s = String(x).trim();
    let neg = false;
    s = s.replace(/,/g, "");
    if (/^\(.+\)$/.test(s)) { neg=true; s=s.slice(1,-1); }
    const n = Number(String(s).replace(/[^0-9.+-]/g, ""));
    if (Number.isNaN(n)) return null;
    return neg ? -n : n;
  }

  function fmtNum(v, maxFrac){
    if (v == null || v === "") return "-";
    if (typeof v === "number"){
      if (!Number.isFinite(v)) return "-";
      const neg = v < 0, a = Math.abs(v);
      const hasFrac = Math.abs(a % 1) > 1e-9;
      const out = a.toLocaleString("ko-KR", hasFrac ? { minimumFractionDigits:0, maximumFractionDigits:maxFrac||2 } : {});
      return neg ? "△" + out : out; // 회계 세모 표기
    }
    const n = parseKoNum(v);
    return n == null ? String(v) : fmtNum(n, maxFrac);
  }

  function indexRows(rows){
    const m=new Map();
    for (const row of rows || []){
      if (!row || !row.company) continue;
      if (!m.has(row.company)) m.set(row.company, []);
      m.get(row.company).push(row);
    }
    return m;
  }

  function firstRow(m,name){
    const a=m.get(name);
    return (a&&a.length)? a[0] : null;
  }

  function destroyCharts(){
    for (const k of ["wf","pl"]){ // ECharts
      if (charts[k]){ try{ charts[k].dispose(); }catch(e){} charts[k]=null; }
    }
    for (const k of ["amort","nb","hist"]){ // Chart.js
      try{ charts[k] && charts[k].destroy(); }catch(e){}
      charts[k]=null;
    }
  }

  function fetchFirst(paths){
    if (!paths || !paths.length) return Promise.reject(new Error("no paths"));
    const [head, ...rest] = paths;
    return fetch(head).then(r=>{
      if (!r.ok) throw new Error("HTTP "+r.status+" "+head);
      return r.json();
    }).catch(err=> rest.length ? fetchFirst(rest) : Promise.reject(err));
  }

  async function fetchJsonSafe(pathsOrUrl){
    const paths = Array.isArray(pathsOrUrl) ? pathsOrUrl : [pathsOrUrl];
    try{
      return await fetchFirst(paths);
    }catch(e){
      console.warn(e);
      return null;
    }
  }

  // ===== Panel 1: windowed CSM waterfall (company × period[year/quarter]) =====
  // Source = long-format CSM_waterfall.json: rows of {원수사명, 공시분기, 항목번호, 값}.
  // 항목번호 1=기초 2=신계약 3=이자 4=가정·경험 5=상각 6=기말. 값 단위 = 억원.
  // Quarter mode needs per-quarter (당분기) movements; current file is YTD(연 누계),
  // so quarter mode is stubbed until the 당분기 table lands. Flip WF_QUARTER_READY when ready.
  const WF_QUARTER_READY = true;   // 마스터에 값_당분기 → 분기 모드 활성화
  const WF_WINDOW = 4;   // 연도: 최신 + 직전 3개년말 = [2023,2024,2025,2026.1Q]
  const WF_Q_WINDOW = 5; // 분기: 최신 포함 직전 5개분기 (owner 2026-06-16)
  const WF_COMPS = [
    { num: 2, ko: "신계약",    full: "신계약 CSM" },
    { num: 3, ko: "이자",      full: "이자 부리" },
    { num: 4, ko: "가정·경험", full: "가정 및 경험 조정" },
    { num: 5, ko: "상각",      full: "CSM 상각" },
  ];

  function wfParseQ(s){ const m=String(s).match(/^(\d{4})\.(\d)Q$/); return m?[+m[1],+m[2]]:[0,0]; }
  function wfCmpDesc(a,b){ const [ay,aq]=wfParseQ(a),[by,bq]=wfParseQ(b); return ay!==by?by-ay:bq-aq; }
  function wfQuartersOf(company){
    const m = ix.wfx.get(company);
    return m ? Array.from(m.keys()).sort(wfCmpDesc) : [];
  }
  function wfVal(company,qtr,num,field){
    const m=ix.wfx.get(company); const qm=m&&m.get(qtr); const rec=qm&&qm.get(num);
    const v=rec ? rec[field||"y"] : null;   // y=연누계(기본), q=당분기
    return (typeof v==="number" && Number.isFinite(v)) ? v : null;
  }
  // 모든 회사 통합 분기축(오름차순) — Panel 6 시계열 x축.
  function wfAllPeriodsAsc(){
    const set = new Set();
    for (const m of ix.wfx.values()) for (const k of m.keys()) set.add(k);
    return Array.from(set).sort((a,b)=> wfCmpDesc(b,a));
  }
  // D5/D6: 분기 공시 여부 — 4Q 외 분기가 하나라도 있으면 분기 공시사. 데이터 기반(이름 하드코딩 금지).
  function wfHasQuarterly(company){
    return wfQuartersOf(company).some(p => { const [,qn]=wfParseQ(p); return qn!==4; });
  }
  // D7: 시계열 축 윈도잉. periodsAsc=해당 회사 분기 오름차순.
  //  분기모드(분기공시사)=직전 5분기 / 그 외(연도모드·분기미제공사)=연말(4Q)+최신 부분분기.
  function selectPeriods(periodsAsc, mode, hasQ, isMobile){
    if(!periodsAsc.length) return [];
    if(mode==="quarter" && hasQ) return periodsAsc.slice(-5);
    const keep = new Set(periodsAsc.filter(p=>{ const [,qn]=wfParseQ(p); return qn===4; }));
    const last = periodsAsc[periodsAsc.length-1];
    if(last){ const [,lq]=wfParseQ(last); if(lq!==4) keep.add(last); }
    return periodsAsc.filter(p=>keep.has(p));
  }
  // 신계약 CSM(2)은 YTD(연누계) → 당기 증분(같은 FY 직전 분기 YTD 차감). 직전 결측 시 span(합산 분기 수).
  function wfNbIncrement(company, period){
    const [y, qn] = wfParseQ(period);
    const cur = wfVal(company, period, 2);
    if (cur == null) return { value:null, span:1 };
    for (let pq = qn-1; pq >= 1; pq--){
      const prev = wfVal(company, y+"."+pq+"Q", 2);
      if (prev != null) return { value: cur - prev, span: qn - pq };
    }
    return { value: cur, span: qn };
  }
  // 드롭다운 이름(옛 파일)과 새 마스터 이름이 다른 5사 대응 (삼성생명 vs 삼성생명보험, 케이비 vs KB 등).
  function wfNorm(s){ return String(s).replace(/\s/g,"").replace(/케이비/g,"KB"); }
  function wfResolve(display){
    if (ix.wfx.has(display)) return display;
    const d = wfNorm(display);
    for (const k of ix.wfx.keys()){ if (wfNorm(k)===d) return k; }
    for (const k of ix.wfx.keys()){ const nk=wfNorm(k); if (nk.includes(d) || d.includes(nk)) return k; }
    return null;
  }
  // 이름 → 코드. 코드 없는 옛 viz/NB는 boot에서 1회만 정규화 매칭 → 이후 전 패널 코드로 동작.
  function codeForName(name){
    if (codeToName[name]) return name; // 이미 코드
    const nn = wfNorm(name);
    for (const code in codeToName){ if (codeToName[code]===name) return code; }
    for (const code in codeToName){ const rn=wfNorm(codeToName[code]); if (rn===nn || rn.includes(nn) || nn.includes(rn)) return code; }
    return null;
  }

  // YEAR window: latest period + prior year-ends (4Q), trailing WF_WINDOW buckets, chrono asc.
  function wfYearBuckets(company){
    const qs = wfQuartersOf(company); if(!qs.length) return [];
    const set = new Set(qs);
    const [ly,lq] = wfParseQ(qs[0]);
    const buckets = [{ year: ly, q: qs[0], label: lq===4 ? String(ly) : qs[0] }];
    for(let k=1;k<WF_WINDOW;k++){
      const y=ly-k, yq=`${y}.4Q`;
      if(set.has(yq)) buckets.push({ year:y, q:yq, label:String(y) });
    }
    return buckets.sort((a,b)=>a.year-b.year);
  }

  // QUARTER window: 최근 WF_Q_WINDOW개 분기 (오름차순). 값_당분기로 분기별 이동.
  function wfQuarterBuckets(company){
    const qs = wfQuartersOf(company); if(!qs.length) return [];   // qs = desc
    return qs.slice(0, WF_Q_WINDOW).reverse().map(q => ({ q, label: q }));
  }

  function wfBuildBars(company, buckets, mode){
    const f = mode==="quarter" ? "q" : "y";   // 분기=당분기, 연도=연누계
    const bars=[];
    const first=buckets[0], last=buckets[buckets.length-1];
    bars.push({ kind:"open", period:first.label, q:first.q, value: wfVal(company,first.q,1,f) });
    for(const b of buckets){
      for(const c of WF_COMPS){
        bars.push({ kind:"comp", period:b.label, q:b.q, comp:c, value: wfVal(company,b.q,c.num,f) });
      }
    }
    bars.push({ kind:"close", period:last.label, q:last.q, value: wfVal(company,last.q,6,f) });
    return bars;
  }

  function wfFmtJo(v, dp){ return (v/10000).toLocaleString("ko-KR",{minimumFractionDigits:dp,maximumFractionDigits:dp}); }

  // ===== 회사 키컬러 (KEYCOLOR-V1, owner 확정 2026-06-12) =====
  // 차트 데이터잉크(워터폴 total 막대·라인 주선)와 select 액티브에만 적용. 배경·패널보더는 무채색 유지.
  // 키 미등록사는 현행 기본 블루 fallback. 표시명 기준 매칭(코드→coName).
  const KEY_COLORS = {
    "삼성생명":"#1428A0", "삼성생명보험":"#1428A0", "삼성화재":"#1428A0", "삼성화재해상보험":"#1428A0",
    "한화생명":"#F37321", "한화생명보험":"#F37321", "한화손해보험":"#F37321",
    "신한라이프":"#0046FF", "신한라이프생명보험":"#0046FF", "신한이지손해보험":"#0046FF",
    "KB손해보험":"#FFBC00", "케이비손해보험":"#FFBC00", "KB라이프생명":"#FFBC00", "케이비라이프생명보험":"#FFBC00",
    "NH농협생명":"#00A05E", "엔에이치농협생명":"#00A05E", "NH농협손해보험":"#00A05E", "엔에이치농협손해보험":"#00A05E",
    "미래에셋생명":"#F58220", "미래에셋생명보험":"#F58220",
    "DB손해보험":"#0E8C3A", "디비손해보험":"#0E8C3A", "DB생명":"#0E8C3A", "디비생명보험":"#0E8C3A",
    "현대해상":"#F47920", "현대해상화재보험":"#F47920",
    "교보생명":"#0B5D52", "교보생명보험":"#0B5D52",
    "메리츠화재":"#E60012", "메리츠화재해상보험":"#E60012",
    "롯데손해보험":"#DA291C",
  };
  const DEFAULT_PRIMARY = "#0d6efd";
  function _hexRgb(h){ const m=/^#?([0-9a-f]{6})$/i.exec(h||""); if(!m) return null; const n=parseInt(m[1],16); return {r:(n>>16)&255,g:(n>>8)&255,b:n&255}; }
  function _relLum(c){ const f=v=>{v/=255; return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);}; return 0.2126*f(c.r)+0.7152*f(c.g)+0.0722*f(c.b); }
  function _darken(c, amt){ const d=v=>Math.round(v*(1-amt)); return `rgb(${d(c.r)},${d(c.g)},${d(c.b)})`; }
  function keyColorOf(name){
    const hex = KEY_COLORS[name];
    if(!hex){ return { primary:DEFAULT_PRIMARY, line:DEFAULT_PRIMARY, soft:"rgba(13,110,253,0.10)", fill:"rgba(13,110,253,0.60)", isKey:false }; }
    const c=_hexRgb(hex);
    // 밝은 색(KB 옐로우 등)은 흰 배경에서 선/축이 안 보이므로 라인용으로 어둡게 보정 (WCAG 가독성). 막대 면적엔 원색.
    const line = (c && _relLum(c) > 0.45) ? _darken(c, 0.32) : hex;
    const soft = c ? `rgba(${c.r},${c.g},${c.b},0.12)` : "rgba(13,110,253,0.10)";
    const fill = c ? `rgba(${c.r},${c.g},${c.b},0.60)` : "rgba(13,110,253,0.60)";
    return { primary:hex, line, soft, fill, isKey:true };
  }
  let currentKey = keyColorOf(null); // renderCompany에서 회사별로 설정

  function renderWfWaterfall(host, company, mode){
    const el = q(host, "#chartWf");
    if (!el || typeof echarts === "undefined") return;
    if (charts.wf){ try{ charts.wf.dispose(); }catch(e){} }
    charts.wf = echarts.init(el, 'iq', { renderer: "canvas" });

    let buckets = mode==="quarter" ? wfQuarterBuckets(company) : wfYearBuckets(company);
    if (window.matchMedia("(max-width:640px)").matches) buckets = buckets.slice(-1);  // D9: 모바일 최신 1버킷
    const bars = wfBuildBars(company, buckets, mode);

    const xs=[], placeholder=[], positive=[], negative=[], totals=[], missing=[];
    let running=0;
    bars.forEach((bar)=>{
      if(bar.kind==="open") xs.push(bar.period+"\n기초");
      else if(bar.kind==="close") xs.push(bar.period+"\n기말");
      else xs.push((bar.comp.num===2 ? bar.period : "")+"\n"+bar.comp.ko);

      if(bar.kind==="open" || bar.kind==="close"){
        placeholder.push("-"); positive.push("-"); negative.push("-"); missing.push("-");
        const v=bar.value; totals.push(v!=null?v:"-");
        if(bar.kind==="open" && v!=null) running=v;
        return;
      }
      const v=bar.value;
      if(v==null){
        const hint=Math.max(Math.abs(running)*0.02, 30);
        placeholder.push(running); positive.push("-"); negative.push("-"); totals.push("-"); missing.push(hint);
        return;
      }
      missing.push("-");
      if(v>=0){ placeholder.push(running); positive.push(v); negative.push("-"); totals.push("-"); running+=v; }
      else    { placeholder.push(running+v); positive.push("-"); negative.push(-v); totals.push("-"); running+=v; }
    });

    const isMobile = window.matchMedia("(max-width:640px)").matches;
    let dataZoom;
    if (isMobile && bars.length > 9){
      const start = Math.max(0, bars.length - 9);
      dataZoom = [{ type:"inside", startValue:start, endValue:bars.length-1 },
                  { type:"slider", height:14, bottom:2, startValue:start, endValue:bars.length-1 }];
    }

    charts.wf.setOption({
      backgroundColor:"transparent",
      tooltip:{
        trigger:"axis", axisPointer:{ type:"shadow" },
        formatter(items){
          const i=items[0].dataIndex; const bar=bars[i];
          const head = bar.kind==="comp"
            ? `${bar.comp.full} · ${bar.period}`
            : `${bar.kind==="open"?"기초":"기말"} CSM · ${bar.period}`;
          if(bar.value==null) return `<b>${head}</b><br/>데이터 없음`;
          const jo=bar.value/10000;
          if(bar.kind==="comp"){
            const sign=bar.value>=0?"+":"△";
            return `<b>${head}</b><br/>${sign}${Math.abs(jo).toLocaleString("ko-KR",{maximumFractionDigits:2})}조 (${sign}${Math.abs(bar.value).toLocaleString("ko-KR")}억)`;
          }
          const s0 = bar.value < 0 ? "△" : "";
          return `<b>${head}</b><br/>${s0}${Math.abs(jo).toLocaleString("ko-KR",{maximumFractionDigits:2})}조 (${s0}${Math.abs(bar.value).toLocaleString("ko-KR")}억)`;
        },
      },
      grid: dataZoom ? { left:52, right:18, top:24, bottom:40 } : { left:52, right:18, top:24, bottom:54 },
      xAxis:{
        type:"category", data:xs,
        axisLabel:{ color:"#495057", fontSize:isMobile?8:10, lineHeight:12, interval:0 },
        axisLine:{ lineStyle:{ color:"#dee2e6" } },
        axisTick:{ show:false },
      },
      yAxis:{
        type:"value", name:"조원",
        nameTextStyle:{ color:"#6c757d", fontSize:11 },
        axisLabel:{ color:"#6c757d", formatter:v=> (v<0?"△":"")+Math.abs(v/10000).toLocaleString("ko-KR",{maximumFractionDigits:1}) },
        splitLine:{ lineStyle:{ color:"#e9ecef" } },
      },
      dataZoom,
      series:[
        { name:"placeholder", type:"bar", stack:"wf", itemStyle:{ color:"transparent" }, emphasis:{ disabled:true }, data:placeholder },
        { name:"missing", type:"bar", stack:"wf", itemStyle:{ color:"rgba(173,181,189,0.55)" }, data:missing },
        { name:"+", type:"bar", stack:"wf", itemStyle:{ color:"#22c55e" }, data:positive,
          label:{ show:!isMobile, position:"top", color:"#212529", fontSize:9, formatter:p=> p.value==="-"?"":"+"+wfFmtJo(p.value,2) } },
        { name:"−", type:"bar", stack:"wf", itemStyle:{ color:"#ef4444" }, data:negative,
          label:{ show:!isMobile, position:"top", color:"#212529", fontSize:9, formatter:p=> p.value==="-"?"":"△"+wfFmtJo(p.value,2) } },
        { name:"total", type:"bar", stack:"wf", itemStyle:{ color:currentKey.primary }, data:totals,
          label:{ show:true, position:"top", color:"#212529", fontSize:10, fontWeight:"bold", formatter:p=> p.value==="-"?"":(p.value<0?"△":"")+wfFmtJo(Math.abs(p.value),1)+"조" } },
      ],
    }, true);
  }

  // ===== Panel 3: 당기순이익 detailed bridge waterfall (PL_breakdown.json) =====
  // Source rows: {원수사명, 공시분기, 항목번호, 항목명, 값(YTD), 값_당분기}. 단위 = 백만원.
  // 손보/생보 공통 상세 분해 — 장기원수는 세부(4·5·6·7), 장기재보험(8)·자동차+일반(13+14)은 묶음:
  //   4 CSM상각 +5 위험조정 +6 예실차 +7 기타 +8 재보험 +(13+14) +(15−16 기타) = 보험손익(1)
  //   → 17 투자손익 → 21 영업외 → (−)23 법인세 → 24 당기순이익  (검산 OK 손보+생보)
  // NOTE: PL company names differ from CSM/dropdown (삼성생명보험 vs 삼성생명) → plResolve() fuzzy-matches.
  const PL_NUM = {
    원수CSM상각:4, 원수RA:5, 원수예실차:6, 기타원수:7, 재보험:8,
    자동차:13, 일반:14, 기타수익:15, 기타비용:16,
    보험손익:1, 투자손익:17, 영업외:21, 법인세:23, 당기순이익:24,
  };

  // CSM 분리공시 미제공사 (owner 결정 2026-06-11): 목록 제외 대신 사유 표기 (PL 분해는 공시되므로 노출 유지)
  const PAA_ONLY = new Set(["KR0051", "신한이지손해보험"]); // 회사코드 + 표시명 둘 다
  const PAA_NOTE = "CSM 분리공시 미제공 보험사입니다 (PAA·단기계약 중심 — 당기순이익 분해 패널 참조).";

  function plQuartersOf(name){
    const m = ix.plx.get(name);
    return m ? Array.from(m.keys()).sort(wfCmpDesc) : [];
  }
  function plResolve(display){
    if (ix.plx.has(display)) return display;
    const norm = s => String(s).replace(/\s/g,"");
    const d = norm(display);
    for (const k of ix.plx.keys()){
      const nk = norm(k);
      if (nk===d || nk.includes(d) || d.includes(nk)) return k;
    }
    return null;
  }
  function plVal(name, qtr, num, field){
    const m=ix.plx.get(name); const qm=m&&m.get(qtr); const rec=qm&&qm.get(String(num));
    if(!rec) return null;
    const v=rec[field];
    return (typeof v==="number" && Number.isFinite(v)) ? v : null;
  }
  function plPeriod(name, mode){
    const qs = plQuartersOf(name); if(!qs.length) return null;
    if(mode==="quarter") return { q:qs[0], field:"q", label:qs[0]+" 당분기" };
    const fy = qs.find(x=>/\.4Q$/.test(x));
    const qsel = fy || qs[0];
    return { q:qsel, field:"y", label: fy ? ("FY"+wfParseQ(fy)[0]+" (연 누계)") : (qsel+" 누계") };
  }
  function plFmtJo(v, dp){ return (v/1e6).toLocaleString("ko-KR",{minimumFractionDigits:dp,maximumFractionDigits:dp}); }

  // Step definitions — each has a getter so chart (1 period) + table (N periods) share one source.
  // g = (항목번호) => 값 for the period. optional:true rows are dropped when null/0 (e.g. 생보 자동차+일반).
  const PL_STEP_DEFS = [
    { ko:"원수 CSM상각", role:"flow", get:g=> g(PL_NUM.원수CSM상각) },
    { ko:"원수 위험조정", role:"flow", get:g=> g(PL_NUM.원수RA) },
    { ko:"원수 예실차",  role:"flow", get:g=> g(PL_NUM.원수예실차) },
    { ko:"기타 원수손익", role:"flow", get:g=> g(PL_NUM.기타원수) },
    { ko:"장기 재보험",  role:"flow", get:g=> g(PL_NUM.재보험) },
    { ko:"자동차+일반",  role:"flow", optional:true, get:g=>{ const a=g(PL_NUM.자동차),b=g(PL_NUM.일반); return (a==null&&b==null)?null:(a||0)+(b||0); } },
    { ko:"기타(사업비용)", role:"flow", optional:true, get:g=>{ const oi=g(PL_NUM.기타수익),oe=g(PL_NUM.기타비용); return (oi==null&&oe==null)?null:(oi||0)-(oe||0); } },
    { ko:"보험손익", role:"anchor", get:g=> g(PL_NUM.보험손익) },
    { ko:"투자손익", role:"flow", get:g=> g(PL_NUM.투자손익) },
    { ko:"영업외손익", role:"flow", get:g=> g(PL_NUM.영업외) },
    { ko:"법인세", role:"flow", get:g=>{ const t=g(PL_NUM.법인세); return t==null?null:-t; } },
    { ko:"당기순이익", role:"end", get:g=> g(PL_NUM.당기순이익) },
  ];
  function plMakeGetter(name, per){ return num => plVal(name, per.q, num, per.field); }

  // Build ordered waterfall steps for one period (손보/생보 공통). Drops optional rows that are null/0.
  function plBuildSteps(name, per){
    const g = plMakeGetter(name, per);
    const steps = [];
    for (const d of PL_STEP_DEFS){
      const v = d.get(g);
      if (d.optional && (v==null || v===0)) continue;
      steps.push({ ko:d.ko, role:d.role, value:v });
    }
    return steps;
  }

  // x-axis label wrapping (full name kept in tooltip + table).
  const PL_WRAP = {
    "원수 CSM상각":"원수\nCSM상각", "원수 위험조정":"원수\n위험조정", "원수 예실차":"원수\n예실차",
    "기타 원수손익":"기타\n원수", "장기 재보험":"장기\n재보험", "자동차+일반":"자동차\n+일반",
    "기타(사업비용)":"기타\n사업비", "보험손익":"보험손익", "투자손익":"투자손익",
    "영업외손익":"영업외", "법인세":"법인세", "당기순이익":"당기\n순이익",
  };

  function renderPlWaterfall(host, name, per){
    const el = q(host, "#chartPl");
    if (!el || typeof echarts === "undefined") return [];
    if (charts.pl){ try{ charts.pl.dispose(); }catch(e){} }
    charts.pl = echarts.init(el, null, { renderer:"canvas" });

    const bars = plBuildSteps(name, per);
    const isMobile = window.matchMedia("(max-width:640px)").matches;

    // 각 막대의 [시작,끝] 값좌표. flow=running에서 step, anchor/end=0 기준.
    // 스택+투명 placeholder 방식은 0선을 넘는 step에서 막대가 0 위로 떠버림(롯데 투자손익: 보험손익 +0.03 → 투자손익이
    // 0 아래로 통과) → custom renderItem으로 [min,max] 사각형을 직접 그려 zero-crossing 정상 처리(부호=아래로).
    const xs=[]; const geo=[]; let running=0;
    bars.forEach(bar=>{
      xs.push(PL_WRAP[bar.ko] || bar.ko);
      if(bar.value==null){ geo.push(null); return; }
      if(bar.role==="anchor" || bar.role==="end"){
        geo.push({ y0:0, y1:bar.value, color:currentKey.primary }); running=bar.value;
      } else {
        const end=running+bar.value;
        geo.push({ y0:running, y1:end, color: bar.value>=0 ? "#22c55e" : "#ef4444" }); running=end;
      }
    });

    const dataZoom = (isMobile && bars.length > 8)
      ? [{ type:"inside" }, { type:"slider", height:14, bottom:2 }] : undefined;

    charts.pl.setOption({
      backgroundColor:"transparent",
      tooltip:{
        trigger:"axis", axisPointer:{ type:"shadow" },
        formatter(items){
          const i=items[0].dataIndex; const bar=bars[i]; if(!bar) return "";
          if(bar.value==null) return `<b>${bar.ko}</b><br/>데이터 없음`;
          const jo=bar.value/1e6, eok=bar.value/100;
          const sign = bar.value<0 ? "△" : (bar.role==="flow" ? "+" : "");
          return `<b>${bar.ko}</b><br/>${sign}${Math.abs(jo).toLocaleString("ko-KR",{maximumFractionDigits:2})}조 (${sign}${Math.abs(eok).toLocaleString("ko-KR",{maximumFractionDigits:0})}억)`;
        },
      },
      grid:{ left:56, right:18, top:24, bottom: dataZoom?38:46 },
      xAxis:{
        type:"category", data:xs,
        axisLabel:{ color:"#495057", fontSize:isMobile?8:10, lineHeight:12, interval:0 },
        axisLine:{ lineStyle:{ color:"#dee2e6" } },
        axisTick:{ show:false },
      },
      yAxis:{
        type:"value", name:"조원",
        nameTextStyle:{ color:"#6c757d", fontSize:11 },
        axisLabel:{ color:"#6c757d", formatter:v=> (v<0?"△":"")+Math.abs(v/1e6).toLocaleString("ko-KR",{maximumFractionDigits:1}) },
        splitLine:{ lineStyle:{ color:"#e9ecef" } },
      },
      dataZoom,
      series:[{
        type:"custom",
        encode:{ y:[0,1] },                 // y축 자동 스케일을 [y0,y1] 범위에서
        renderItem:(params, api)=>{
          const idx=params.dataIndex; const g=geo[idx]; const bar=bars[idx];
          if(!g) return;
          const xPix=api.coord([idx,0])[0];
          const yHi=api.coord([idx, Math.max(g.y0,g.y1)])[1];
          const yLo=api.coord([idx, Math.min(g.y0,g.y1)])[1];
          const bw=Math.max(6, api.size([1,0])[0]*0.55);
          const children=[{
            type:"rect",
            shape:{ x:xPix-bw/2, y:yHi, width:bw, height:Math.max(1, yLo-yHi) },
            style:{ fill:g.color },
          }];
          if(!isMobile){
            const isTot = bar.role!=="flow";
            const txt = (bar.value<0?"△":(bar.role==="flow"?"+":""))+plFmtJo(Math.abs(bar.value),2)+(isTot?"조":"");
            children.push({ type:"text", style:{ text:txt, x:xPix, y:yHi-4, textAlign:"center", textVerticalAlign:"bottom", fill:"#212529", fontSize:isTot?10:9, fontWeight:isTot?"bold":"normal" } });
          }
          return { type:"group", children };
        },
        data: geo.map(g=> g ? [g.y0, g.y1] : [0,0]),
        z:2,
      }],
    }, true);
    return bars;
  }

  // ---- shared table builder (matches Panel 5 style) ----
  function buildMiniTable(headers, rows){
    const tbl=document.createElement("table");
    const thead=document.createElement("thead"); const htr=document.createElement("tr");
    headers.forEach((h,i)=>{ const th=document.createElement("th"); th.textContent=h; if(i>0) th.className="num"; htr.appendChild(th); });
    thead.appendChild(htr); tbl.appendChild(thead);
    const tbody=document.createElement("tbody");
    for(const r of rows){
      const tr=document.createElement("tr");
      if(r.cls) tr.className=r.cls;
      if(r.hide) tr.style.display="none";
      r.cells.forEach((c,i)=>{
        const td=document.createElement("td");
        if(c instanceof Node) td.appendChild(c); else td.textContent=c;
        if(i>0) td.className="num";
        if(r.bold) td.style.fontWeight="700";
        if(r.muted) td.style.color="#6c757d";
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
    tbl.appendChild(tbody);
    return tbl;
  }
  // 한국 회계 표기: 정수 반올림 + 천단위 콤마 + 음수는 △(세모).
  function samo(n){
    if(n==null || !Number.isFinite(n)) return "—";
    const r = Math.round(n);
    return r<0 ? "△"+Math.abs(r).toLocaleString("ko-KR") : r.toLocaleString("ko-KR");
  }
  function fmtEok(vMn){ return vMn==null ? "—" : samo(vMn/100); }

  // shock 표기 통일(inbox 3b): "3.27% 증가/상승"→"3.27%↑", "9.16% 감소/하락"·"(-)9.16%"→"9.16%↓".
  // 복합·비정형(가정변경효과·괄호병기·금액덩어리 등)은 부분치환 후 원문 보존(파싱 실패해도 안전).
  function fmtShock(raw){
    if (raw == null) return "-";
    let s = String(raw).trim();
    if (!s || s === "-") return s || "-";
    s = s.replace(/\(-\)\s*(\d[\d,]*(?:\.\d+)?)\s*%(p?)/g, "$1%$2↓");      // (-)9.16% → 9.16%↓
    s = s.replace(/(\d[\d,]*(?:\.\d+)?)\s*%(p?)\s*(증가|상승)/g, "$1%$2↑"); // 3.27% 증가 → 3.27%↑
    s = s.replace(/(\d[\d,]*(?:\.\d+)?)\s*%(p?)\s*(감소|하락)/g, "$1%$2↓"); // 9.16% 감소 → 9.16%↓
    s = s.replace(/(\d[\d,]*(?:\.\d+)?)\s*%(p?)\s*[\^▲]/g, "$1%$2↑");      // 3.27%^ / 3.27%▲ → 3.27%↑
    s = s.replace(/(\d[\d,]*(?:\.\d+)?)\s*%(p?)\s*▼/g, "$1%$2↓");          // 3.27%▼ → 3.27%↓
    // 삼성생명류: 부호·방향어 없는 선두 "3.27%"는 상향 충격 → ↑ (하향은 위 (-)룰로 처리). 이미 ↑/↓면 보존.
    s = s.replace(/^(\s*)(\d[\d,]*(?:\.\d+)?)\s*%(p?)(?!\s*[↑↓])/, "$1$2%$3↑");
    return s.replace(/\s{2,}/g, " ").trim();
  }

  // D1: 민감도 표 기준시점(as-of). 데이터에 period/as_of가 비어 rcept_no(접수번호 앞 8자리=제출일)에서 파생.
  // DART 정기보고서 제출월 → 보고 기준일: 1~4월=직전 사업연도(12-31), 5~6=1Q(03-31), 7~9=반기(06-30), 그 외=3Q(09-30).
  function asOfFromRcept(rcept){
    const s = String(rcept||"").replace(/\D/g, "");
    if (s.length < 8) return null;
    const y = +s.slice(0,4), m = +s.slice(4,6);
    if (m <= 4) return { label:"FY"+(y-1)+" 사업보고서", date:(y-1)+"-12-31" };
    if (m <= 6) return { label:"FY"+y+" 1분기보고서", date:y+"-03-31" };
    if (m <= 9) return { label:"FY"+y+" 반기보고서",   date:y+"-06-30" };
    return            { label:"FY"+y+" 3분기보고서", date:y+"-09-30" };
  }
  function senAsOf(sPick){
    if(!sPick) return null;
    if(sPick.as_of) return { label:(sPick.period_label||sPick.period||"공시"), date:String(sPick.as_of) };
    return asOfFromRcept(sPick.rcept_no);
  }

  // Trailing periods for the PL table: year → latest 3 FY(4Q); quarter → latest 4 quarters (chrono asc).
  function plTablePeriods(name, mode){
    const qs = plQuartersOf(name); // desc
    if(!qs.length) return [];
    // CSM시계열·CSM waterfall과 동일 윈도잉(selectPeriods): 분기=최신 포함 직전5분기 / 연도=연말(4Q)+최신부분.
    const asc = qs.slice().reverse();
    const hasQ = asc.some(p=>{ const [,qn]=wfParseQ(p); return qn!==4; });
    const sel = selectPeriods(asc, mode, hasQ, false);   // 표는 가로 스크롤 → 모바일도 풀 윈도우
    return sel.map(qq=>{
      const is4Q = /\.4Q$/.test(qq);
      return { q:qq,
               field: (mode==="quarter") ? "q" : "y",
               label: (mode==="quarter") ? qq : (is4Q ? String(wfParseQ(qq)[0]) : qq) };
    });
  }

  function heatCss(v, absMax){
    const mx = Math.max(Math.abs(absMax||1), 1e-9)
    const t = Math.max(-1, Math.min(1, Number(v)/mx))
    if (t<=0){
      const u=-t;
      return "rgba(239,68,68,"+(0.10+0.55*u)+")"
    }
    const u=t;
    return "rgba(34,197,94,"+(0.11+0.58*u)+")"
  }

  const NB_LINE_COLORS = ["#0d6efd", "#198754", "#fd7e14", "#6f42c1", "#20c997", "#dc3545"];

  function nbChartData(nbJson, slug, bucket){
    if(!nbJson) return { periods: [], datasets: [] };
    const section = nbJson[bucket];
    if(!section||!section[slug]) return { periods: [], datasets: [] };
    const companySeries = section[slug].series;
    if(!companySeries || typeof companySeries!=="object" || Array.isArray(companySeries)){
      return { periods: [], datasets: [] };
    }

    const periodSet = new Set();
    const seriesList = [];
    for (const [key, sub] of Object.entries(companySeries)){
      if(!sub || !Array.isArray(sub.points) || !sub.points.length) continue;
      const byPeriod = new Map();
      for (const p of sub.points){
        if(!p || p.period==null) continue;
        const period = String(p.period);
        const value = Number(p.value);
        if(!Number.isFinite(value)) continue;
        periodSet.add(period);
        byPeriod.set(period, value);
      }
      if(!byPeriod.size) continue;
      seriesList.push({ key, label: sub.label || key, byPeriod });
    }

    const periods = [...periodSet].sort((a,b)=> String(a).localeCompare(String(b), "ko", {numeric:true}));
    const datasets = seriesList.map((s, idx)=>{
      const color = NB_LINE_COLORS[idx % NB_LINE_COLORS.length];
      const isTotal = s.key === "total";
      return {
        label: s.label,
        data: periods.map(p=> s.byPeriod.has(p) ? s.byPeriod.get(p) : null),
        borderColor: color,
        backgroundColor: color + "18",
        borderWidth: isTotal ? 2.5 : 1.5,
        borderDash: isTotal ? [] : [6, 4],
        pointRadius: isTotal ? 4 : 3,
        tension: 0.25,
        spanGaps: true,
        fill: false,
      };
    });

    return { periods, datasets };
  }

  function stub(el, show, msg){
    if(!el) return;
    el.style.display = show?"block":"none";

  }

  function countUp(el, target, fmt, dur){
    if(!el||!Number.isFinite(target)){if(el)el.textContent=fmt?fmt(target):'—';return;}
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){el.textContent=fmt(target);return;}
    const d=dur||500, t0=performance.now();
    (function step(t){const p=Math.min((t-t0)/d,1),e=1-Math.pow(1-p,3);el.textContent=fmt(target*e);if(p<1)requestAnimationFrame(step);})(t0);
  }

  // 억원 → "X조 Y,YYY억원" (1조 미만은 "Y,YYY억원"). 억 정수 반올림, 음수 △.
  function fmtEokKR(eok){
    if(eok==null || !Number.isFinite(eok)) return '—';
    const neg = eok < 0;
    const v = Math.round(Math.abs(eok));
    const jo = Math.floor(v/10000), rem = v%10000;
    const s = jo>0 ? (jo.toLocaleString()+'조'+(rem>0 ? (' '+rem.toLocaleString()+'억원') : '')) : (v.toLocaleString()+'억원');
    return (neg?'△':'')+s;
  }

    // Panel 5 — NB CSM 배수 시계열 (NB_CSM_multiple.json 마스터, 코드 매칭, 2026.1Q까지 35사).
    q(host,"#nbStub").style.display="none"; q(host,"#nbWrap").style.display="none"; q(host,"#nbStub").textContent="";
    const nbPts = (ix.nbm.get(company) || []).filter(r => r["신계약CSM배수_연누계"] != null);
    if(!nbPts.length){
      q(host,"#nbStub").style.display="block";
      q(host,"#nbStub").textContent = (PAA_ONLY.has(company) || PAA_ONLY.has(coName)) ? PAA_NOTE : "신계약 CSM 배수 데이터 미수록 보험사입니다. (재보험사·외국계 등 월납월초 분모 없음)";
    } else {
      q(host,"#nbWrap").style.display="block";
      // D7/D9: nbPts는 boot에서 분기 오름차순. 동일 윈도잉 적용(분기→5분기, 연도→연말+최신, 모바일→1시점).
      const nbAsc = nbPts.map(r => r["공시분기"]);
      const nbHasQ = nbAsc.some(p=>{ const [,qn]=wfParseQ(p); return qn!==4; });
      const nbKeep = new Set(selectPeriods(nbAsc, wfMode, nbHasQ, _mob));
      const nbView = nbPts.filter(r => nbKeep.has(r["공시분기"]));
      const labels = nbView.map(r => { const p=r["공시분기"]; const [yy,qn]=wfParseQ(p); return (wfMode!=="quarter" && qn===4) ? String(yy) : p; });
      const ytd = nbView.map(r => r["신계약CSM배수_연누계"]);
      const qtr = nbView.map(r => r["신계약CSM배수_당분기"]);
      // 기준(period)에 맞춰 한 계열만: 연도→연누계 배수, 분기→당분기 배수 (반대 기준은 무의미).
      const useQ = wfMode === "quarter";
      const ds = [{
        label: useQ ? "당분기 배수" : "연누계 배수",
        data: useQ ? qtr : ytd,
        borderColor:currentKey.line, backgroundColor:currentKey.soft,
        borderWidth:2.5, pointRadius:4, pointHoverRadius:6, tension:0.2, spanGaps:true, fill:true,
      }];
      charts.nb=new Chart(canvasCtx(host,"#canvasNb"),{
        type:"line",
        data:{ labels, datasets: ds },
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{
            legend:{ display: true, position: window.innerWidth < 640 ? "bottom" : "top" },
            title:{display:true,text:"NB CSM 배수 (신계약 CSM ÷ 월납월초, "+coName+")" },
            tooltip:{ callbacks:{ label:(ctx)=> `${ctx.dataset.label}: ${ctx.parsed.y==null?"—":fmtNum(Number(ctx.parsed.y),2)+"×"}` } },
          },
          scales:{ y:{ ticks:{ callback:(vv)=> fmtNum(Number(vv),1) + "×" } } }
        },
      })
    }

    const sPick=firstRow(ix.sen,company);
    const scen = (sPick && Array.isArray(sPick.scenarios)) ? sPick.scenarios : [];
    const sOk = !!(sPick && sPick.status==="ok" && scen.length);
    const senMsg = !sPick ? "민감도 데이터 미수록 보험사입니다." : "% 충격 기준 보험위험 민감도표가 없는 보험사입니다.";
    stub(q(host,"#senStub"), !sOk, senMsg);
    const senAo = senAsOf(sPick);   // D1: 기준시점(as-of) 헤더
    q(host,"#senCap").textContent = senAo ? ("기준: " + senAo.label + " (" + senAo.date + ")")
                                          : (sPick && sPick.caption ? String(sPick.caption) : "");
    q(host,"#senTable").innerHTML="";
    if (sOk){
      const deltas = scen.map(z=> Number(z.csm_delta)).filter(Number.isFinite)
      const absMax = deltas.length? Math.max(...deltas.map(Math.abs)) : 1

      const tbl=document.createElement("table"); const thead=document.createElement("thead"); const tr=document.createElement("tr");
      for(const h of ["위험요인","충격","ΔCSM(억원)","손익영향"]) { const th=document.createElement("th"); th.textContent=h; tr.appendChild(th)}
      thead.appendChild(tr); tbl.appendChild(thead); const tbody=document.createElement("tbody")
      for (const row of scen){
        const rr=document.createElement("tr")
        const t1=document.createElement("td"); t1.textContent= row.risk!=null?String(row.risk):"-"
        const t2=document.createElement("td"); t2.textContent= fmtShock(row.shock)
        const t3=document.createElement("td"); t3.className="num";
        if (row.csm_delta == null) { t3.textContent="—"; t3.style.color="#adb5bd"; t3.title="미공시 (해당 보험사 민감도표에 CSM 컬럼 없음)"; }
        else { const cd = Number(row.csm_delta); t3.textContent=samo(cd); t3.style.background=heatCss(cd, absMax); }  // D3: 억 정수 반올림
        const t4=document.createElement("td"); t4.className="num";
        if (row.pl_impact == null) { t4.textContent="—"; t4.style.color="#adb5bd"; t4.title="미공시"; }
        else { t4.textContent=samo(Number(row.pl_impact)); }  // D3: 억 정수 반올림
        rr.appendChild(t1); rr.appendChild(t2); rr.appendChild(t3); rr.appendChild(t4)
        tbody.appendChild(rr)
      }
      tbl.appendChild(tbody); q(host,"#senTable").appendChild(tbl)
      if (sPick && sPick.caption){   // D1: 공시 각주는 표 아래 muted로 보존(헤더는 as-of)
        const cnote=document.createElement("div"); cnote.className="small-muted"; cnote.style.marginTop="6px";
        cnote.textContent=String(sPick.caption); q(host,"#senTable").appendChild(cnote);
      }
    }

    // ===== Panel 6: CSM 시계열 — Panel 1과 동일 소스(CSM_waterfall.json / ix.wfx) =====
    // 기존 csm_waterfall_history.json은 stale(2025.3Q·2026.1Q 결측, 초기 2023 미교정)이라 폐기.
    const wfHistName = ix.wfx.has(company) ? company : null;
    stub(q(host,"#histStub"), !wfHistName, (PAA_ONLY.has(company) || PAA_ONLY.has(coName)) ? PAA_NOTE : "신규 CSM waterfall 데이터 미수록 보험사입니다.");
    if (wfHistName){
      // D6/D7/D9: 축 윈도잉 — 분기→직전5분기, 연도→연말+최신부분, 모바일→최신1시점. (분기 미제공사는 연 fallback)
      const compAsc = wfQuartersOf(wfHistName).slice().reverse();   // wfQuartersOf=desc → asc
      const periods = selectPeriods(compAsc, wfMode, wfHasQuarterly(wfHistName), _mob);
      const histLabels = periods.map(p => { const [yy,qn]=wfParseQ(p); return (wfMode!=="quarter" && qn===4) ? String(yy) : p; });
      const closingValues = periods.map(p => { const v = wfVal(wfHistName, p, 6); return v==null ? null : v/10000; }); // 억 → 조
      // 신계약 CSM(2)은 YTD(연누계) → 같은 FY 직전 분기 차감해 당기 증분(중간 결측은 span 합산).
      const nbInc = periods.map(p => wfNbIncrement(wfHistName, p));
      const nbValues = nbInc.map(o => o.value==null ? null : o.value/10000); // 억 → 조
      const nbSpans  = nbInc.map(o => o.span);
      // 전체회사 비교 불필요 — 배경선 제거. y축은 조회 회사 기말 CSM 범위에만 동적 스케일.
      const _selVals = closingValues.filter(v => typeof v === "number" && Number.isFinite(v));
      let histYMin, histYMax;
      if (_selVals.length){
        const lo = Math.min(..._selVals), hi = Math.max(..._selVals);
        const pad = Math.max((hi - lo) * 0.20, hi * 0.06, 0.2);
        histYMin = Math.max(0, lo - pad);
        histYMax = hi + pad;
      }
      charts.hist = new Chart(canvasCtx(host, "#canvasHist"), {
        type: "line",
        data: {
          labels: histLabels,
          datasets: [
            {
              label: "기말 CSM 잔액 (실선)",
              data: closingValues,
              borderColor: currentKey.line,
              backgroundColor: currentKey.soft,
              borderWidth: 3,
              pointRadius: 4,
              pointHoverRadius: 6,
              tension: 0.15,
              fill: true,
              spanGaps: false,
              order: 1,
              yAxisID: "y",
            },
            {
              label: "신계약 CSM 시계열 (점선)",
              data: nbValues,
              _spans: nbSpans,
              borderColor: "rgb(255, 99, 132)",
              backgroundColor: "transparent",
              borderWidth: 2,
              borderDash: [6, 4],
              pointRadius: 3,
              pointHoverRadius: 5,
              tension: 0.15,
              fill: false,
              spanGaps: false,
              order: 2,
              yAxisID: "y1",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: { display: true, text: "CSM 시계열 · " + coName },
            legend: {
              display: true,
              position: window.innerWidth < 640 ? "bottom" : "top",
              labels: {
                filter: (item) => {
                  // hide the 22 background lines from legend
                  const ds = item && item.datasetIndex;
                  if (ds == null) return true;
                  const dataset = charts.hist && charts.hist.data.datasets[ds];
                  return dataset && !dataset._bg;
                },
              },
            },
            tooltip: {
              mode: "index",
              intersect: false,
              filter: (ctx) => {
                const ds = ctx.dataset;
                return ds && !ds._bg;  // only show selected company in tooltip
              },
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${fmtNum(ctx.parsed.y, 2)}조`,
                afterLabel: (ctx) => {
                  const sp = ctx.dataset._spans && ctx.dataset._spans[ctx.dataIndex];
                  return (sp && sp > 1) ? `  (${sp}개 분기 합산 — 중간 분기 미공시)` : undefined;
                },
              },
            },
          },
          interaction: { mode: "nearest", axis: "x", intersect: false },
          scales: {
            y: {
              type: "linear", position: "left", beginAtZero: false,
              min: histYMin, max: histYMax,
              title: { display: true, text: "기말 CSM (조원)", color: currentKey.line },
              ticks: { callback: (v) => fmtNum(v, 1) + "조", color: currentKey.line },
              grid: { color: currentKey.soft },
            },
            y1: {
              type: "linear", position: "right", beginAtZero: true,
              title: { display: true, text: "신계약 CSM (당기 증분, 조원)", color: "rgb(255, 99, 132)" },
              ticks: { callback: (v) => fmtNum(v, 2) + "조", color: "rgb(255, 99, 132)" },
              grid: { drawOnChartArea: false },
            },
            x: { title: { display: true, text: wfMode==="quarter" ? "분기" : "연도" } },
          },
        },
      });
    }
  }

  function onSelect(){
    const sel=document.getElementById("company");
    const v=sel&&sel.value;
    const dash=document.getElementById("dashHost");
    const hint=document.getElementById("emptyHint");
    if(!v){
      destroyCharts();
      const _sw=document.getElementById("coSwatch"); if(_sw) _sw.style.background="transparent";
      const _cs=document.getElementById("company"); if(_cs){ _cs.style.borderColor=""; _cs.style.boxShadow=""; }
      dash.style.display="none"; hint.style.display="block"; dash.innerHTML=""; return;
    }
    dash.style.display="block"; hint.style.display="none";
    renderCompany(v);
  }

  async function boot(){
    // D10: 9개 JSON을 직렬 await → Promise.all 병렬(진입 로딩 지연 경감). 로딩 힌트 표시.
    const _eh=document.getElementById("emptyHint");
    if (_eh) _eh.textContent="데이터 불러오는 중…";
    const [wf, amort, plx, senx, nbx, histx, wfxRaw, plxRaw, nbmRaw] = await Promise.all([
      fetchJsonSafe(PATHS.wf), fetchJsonSafe(PATHS.amort), fetchJsonSafe(PATHS.pl),
      fetchJsonSafe(PATHS.sen), fetchJsonSafe(PATHS.nb), fetchJsonSafe(PATHS.hist),
      fetchJsonSafe(PATHS.wfx), fetchJsonSafe(PATHS.plx), fetchJsonSafe(PATHS.nbm),
    ]);
    if (_eh) _eh.textContent="보험사를 선택해 주세요";

    payload.wf=wf; payload.amort=amort; payload.pl=plx; payload.sen=senx; payload.nb=nbx; payload.hist=histx;

    // Panel 1/2 long-format index: CODE -> quarter -> 항목번호 -> 값  (+ 코드↔이름 등록부)
    if (Array.isArray(wfxRaw)){
      for (const r of wfxRaw){
        const code=r&&r["원보험사코드"], qq=r&&r["공시분기"], num=r&&r["항목번호"];
        if(!code||!qq||num==null) continue;
        if(r["원수사명"]) codeToName[code]=r["원수사명"];
        let byQ=ix.wfx.get(code); if(!byQ){ byQ=new Map(); ix.wfx.set(code,byQ); }
        let byN=byQ.get(qq); if(!byN){ byN=new Map(); byQ.set(qq,byN); }
        const y=Number(r["값"]); const dq=Number(r["값_당분기"]);
        byN.set(num, { y: Number.isFinite(y)?y:null, q: Number.isFinite(dq)?dq:null });
      }
    }

    // Panel 3 long-format index: CODE -> quarter -> 항목번호(string) -> {y:값, q:값_당분기}
    if (Array.isArray(plxRaw)){
      for (const r of plxRaw){
        const code=r&&r["원보험사코드"], qq=r&&r["공시분기"], num=r&&r["항목번호"];
        if(!code||!qq||num==null) continue;
        if(!codeToName[code] && r["원수사명"]) codeToName[code]=r["원수사명"];
        let byQ=ix.plx.get(code); if(!byQ){ byQ=new Map(); ix.plx.set(code,byQ); }
        const y=Number(r["값"]); const dq=Number(r["값_당분기"]);
        byQ.get(qq) || byQ.set(qq, new Map());
        byQ.get(qq).set(String(num), { y: Number.isFinite(y)?y:null, q: Number.isFinite(dq)?dq:null });
      }
    }

    // NB CSM 배수 마스터: code -> [rows] (공시분기 오름차순). Panel 5 시계열 (2026.1Q까지, 35사).
    if (Array.isArray(nbmRaw)){
      for (const r of nbmRaw){
        const code=r&&r["원보험사코드"]; if(!code) continue;
        if(!codeToName[code] && r["원수사명"]) codeToName[code]=r["원수사명"];
        let a=ix.nbm.get(code); if(!a){ a=[]; ix.nbm.set(code,a); }
        a.push(r);
      }
      for (const a of ix.nbm.values()) a.sort((x,y)=>{ const px=wfParseQ(x["공시분기"]), py=wfParseQ(y["공시분기"]); return px[0]!==py[0]?px[0]-py[0]:px[1]-py[1]; });
    }

    // 코드 없는 옛 viz(amort/sen)·NB는 boot에서 code로 재키잉(이름 정규화 1회 → 이후 전부 코드).
    const reindexByCode = (companies) => {
      const m = new Map();
      for (const c of (companies||[])){ if(!c||!c.company) continue; const code=codeForName(c.company); if(code && !m.has(code)) m.set(code, [c]); }
      return m;
    };
    ix.amort = reindexByCode(amort && amort.companies);
    ix.sen   = reindexByCode(senx && senx.companies);
    ix.pl    = indexRows(plx && plx.companies); // legacy(미사용)
    for (const nm in NB_LOOKUP){ const code=codeForName(nm); if(code) nbByCode[code]=NB_LOOKUP[nm]; }

    const line = document.getElementById("wfPeriodLine");
    if (line) line.textContent = ix.wfx.size ? ("CSM 워터폴 커버리지: "+ix.wfx.size+"개사 · 2023.1Q~2026.1Q · 연 누계(YTD) 기준") : "";

    // 드롭다운: 회사코드(KR0001…) 순 정렬, value=코드, 표시=이름
    const codes = Object.keys(codeToName).sort();
    const sel=document.getElementById("company");
    for (let i=sel.options.length-1;i>=1;i--) sel.remove(i);
    for (const code of codes){
      const opt=document.createElement("option"); opt.value=code; opt.textContent=codeToName[code]; sel.appendChild(opt)
    }
    sel.addEventListener("change", onSelect);
    const perSel=document.getElementById("wfPeriod");
    if (perSel) perSel.addEventListener("change", ()=>{ if (sel.value) renderCompany(sel.value); });
    window.addEventListener("resize", ()=>{ if (charts.wf) charts.wf.resize(); if (charts.pl) charts.pl.resize(); });
    // Re-render on mobile/desktop breakpoint cross so the amort chart switches 5y <-> 10y.
    window.matchMedia("(max-width:640px)").addEventListener("change", ()=>{ if (sel.value) renderCompany(sel.value); });

    // F1: auto-select company from URL param (?company=...). Used by
    // index.html bubble click → IFRS17 cross-nav.
    try {
      const params = new URLSearchParams(window.location.search);
      const wantedRaw = params.get("company");
      if (wantedRaw){
        const wanted = decodeURIComponent(wantedRaw);
        const pickCode = codeToName[wanted] ? wanted : codeForName(wanted); // 코드 또는 이름 허용
        if (pickCode){
          sel.value = pickCode;
          onSelect();
        } else {
          const hint=document.getElementById("emptyHint");
          if (hint) hint.textContent = "URL의 회사 '"+wanted+"'를 코호트에서 찾지 못했어. 위 드롭다운에서 직접 선택해줘.";
        }
      }
    } catch (e) { /* URL parse safe-guard */ }
  }

  boot().catch(()=>{
    const hint=document.getElementById("emptyHint");
    if (hint) hint.textContent="JSON 패치를 불러오지 못했습니다. http 로컬 서버로 파일을 여세요.";
  })
})();

</script>
  <footer style="max-width:1320px;margin:28px auto 0;padding:14px 16px 24px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;line-height:1.8">
    자료: 금융감독원 정기경영공시 · DART 전자공시 · 보험개발원 — 회사별 최신 공시 분기 기준 (2026.1Q)<br/>
    본 사이트의 수치는 공시자료를 가공한 것으로 오류가 있을 수 있으며, 투자 판단의 근거로 사용할 수 없습니다. 음수는 회계 관행에 따라 △로 표기합니다. © 2026 InsureQuant
  </footer>
<script>
(function(){
  if(!window.IntersectionObserver) return;
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const obs=new IntersectionObserver((ens,o)=>{ens.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');o.unobserve(e.target);}});},{threshold:0.08,rootMargin:'0px 0px -12px 0px'});
  function observe(root){(root||document).querySelectorAll('.panel:not(.will-reveal)').forEach(p=>{p.classList.add('will-reveal');obs.observe(p);});}
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>observe());
  else observe();
  window._revealPanels=observe;
})();
</script>
