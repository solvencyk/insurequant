<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>InsureQuant — IFRS17</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
:root{--bg:#ffffff; --card:#f8f9fa; --border:#e9ecef; --text:#212529; --muted:#6c757d; --primary:#0d6efd; --primary-hover:#0b5ed7;}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR}
    header{position:sticky;top:0;padding:10px 16px;border-bottom:1px solid var(--border);background:#ffffff;z-index:1000}
    .brand{font-weight:700;margin-bottom:12px;cursor:pointer;color:var(--primary);text-decoration:none}
    .brand:hover{color:var(--primary-hover)}
    .tabs{display:flex;gap:4px;margin-bottom:0}
    .tab{padding:8px 16px;border:1px solid var(--border);border-radius:8px 8px 0 0;background:var(--card);color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.2s;}
    .tab:hover{background:var(--primary);color:white;border-color:var(--primary)}
    .tab.active{background:var(--primary);color:white;border-color:var(--primary)}
    .container{max-width:1320px;margin:0 auto;padding:16px}
    .panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
    .panel h2{margin:0 0 16px 0;color:var(--text);font-size:20px;font-weight:600}
    .panel p{color:var(--muted);line-height:1.6;margin:0 0 12px 0}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:space-between;margin-bottom:16px}
    .select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#ffffff;color:#212529}
    .chart-container{position:relative;height:500px;border:1px solid var(--border);border-radius:8px;background:#ffffff;padding:16px}
    .coming-soon{text-align:center;padding:60px 20px;color:var(--muted)}
    .coming-soon h3{font-size:24px;margin:0 0 12px 0;color:var(--text)}
    .coming-soon p{font-size:16px;margin:0}
    .table-container{margin-top:32px;}
    table{border-collapse:collapse;width:100%;}
    th, td{border:1px solid var(--border);padding:6px 8px;text-align:left;}
    th{background:var(--card);}
    th:nth-child(n+2), td:nth-child(n+2){text-align:right;} /* 항목명 제외한 모든 셀 오른쪽 정렬 */
    td.subitem{padding-left:24px;color:var(--muted);font-size:12px;}
.small-muted{font-size:12px;color:var(--muted)}
.muted{color:var(--muted)}
.chart-sm{height:380px}
.placeholder-empty{text-align:center;padding:44px 16px;color:var(--muted);font-size:16px}
.stub-msg{color:var(--muted);font-size:14px;padding:12px;border:1px dashed var(--border);border-radius:8px;background:#ffffff}
.table-wrap{overflow:auto;max-height:520px;border:1px solid var(--border);border-radius:8px;background:#ffffff;font-size:13px}
th.num, td.num{text-align:right;font-variant-numeric:tabular-nums}
    /* Mobile responsive (<=640px) - M1 shared foundation */
    @media (max-width:640px){
      header{padding:8px 12px}
      .brand{font-size:15px}
      .brand .hint{display:none}
      .container{padding:10px}
      .tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;gap:6px;padding-bottom:2px}
      .tab{flex:0 0 auto;padding:8px 12px;font-size:13px}
      .controls{gap:8px}
      .select{padding:7px 8px;font-size:13px}
      .panel{padding:14px}
      .panel h2{font-size:17px}
      .chart-container{height:360px;padding:8px}
      .chart-sm{height:300px}
      .table-container{overflow-x:auto;-webkit-overflow-scrolling:touch}
      .table-wrap{max-height:60vh}
      table{font-size:12px}
      th,td{padding:4px 6px}
    }
</style>
</head>
<body>
  <header>
    <a href="index.html" class="brand">InsureQuant <span class="hint" style="color:var(--muted);font-weight:400">IFRS17 분석·시각화</span></a>
    <div class="tabs">
      <a href="K-ICS.html" class="tab">K-ICS</a>
      <a href="IFRS17.html" class="tab active">IFRS17</a>
      <a href="공시보고서.html" class="tab">공시/보고서</a>
    </div>
  </header>
  <div class="container">
    <div class="panel">
      <h2>IFRS17 통합 현황</h2>
      <p>K-ICS 템플릿과 동일 스타일의 IFRS17 분석 패널입니다.</p>
      <p id="wfPeriodLine" class="small-muted"></p>
    </div>
    <div class="panel">
      <div class="controls">
        <label>보험사: <select id="company" class="select"><option value="">보험사 선택</option></select></label>
      </div>
      <div id="emptyHint" class="placeholder-empty">보험사를 선택해 주세요</div>
      <div id="dashHost" style="display:none"></div>
    </div>
  </div>

  <template id="dashTpl">
    <div class="panel" data-pane="wf">
      <h2>1) CSM 이동 (Waterfall)</h2>
      <div class="small-muted" style="margin-bottom:10px" id="wfMeta"></div>
      <div id="wfStub" class="stub-msg" style="display:none"></div>
      <div class="chart-container chart-sm"><div id="chartWf" style="width:100%;height:100%"></div></div>
    </div>
    <div class="panel" data-pane="amort">
      <h2>2) CSM 상각 스케줄 (연도별)</h2>
      <div class="small-muted" id="amortCap"></div>
      <div id="amortStub" class="stub-msg" style="display:none"></div>
      <div class="chart-container chart-sm"><canvas id="canvasAmort"></canvas></div>
    </div>
    <div class="panel" data-pane="pl">
      <h2>3) 보험 손익(IM) 분해</h2>
      <div class="small-muted" id="plCap"></div>
      <div id="plStub" class="stub-msg" style="display:none"></div>
      <div class="chart-container"><canvas id="canvasPl"></canvas></div>
    </div>
    <div class="panel" data-pane="nb">
      <h2>4) NB · CSM 비율(IR 공시 매핑)</h2>
      <div id="nbStub" class="stub-msg"></div>
      <div id="nbWrap" style="display:none"><div class="chart-container chart-sm"><canvas id="canvasNb"></canvas></div></div>
    </div>
    <div class="panel" data-pane="sens">
      <h2>5) 민감도(ΔCSM)</h2>
      <div class="small-muted" id="senCap"></div>
      <div id="senStub" class="stub-msg" style="display:none"></div>
      <div class="table-wrap" id="senTable"></div>
    </div>
    <div class="panel" data-pane="hist">
      <h2>6) CSM 시계열 (2023.1Q ~ 2026.1Q)</h2>
      <div class="small-muted" id="histCap">선택한 보험사의 13분기 CSM 진화. 회색 배경선은 23사 전체 (highlight: 선택사). 'no_csm_block' 분기는 점선 + null로 표시 (사업보고서는 통상 ok, 1Q/3Q 분기보고서는 rollforward 표 미포함 케이스 다수).</div>
      <div id="histStub" class="stub-msg" style="display:none"></div>
      <div class="chart-container"><canvas id="canvasHist"></canvas></div>
    </div>
  </template>

<script>
(() => {
  function resolveUrl(relativePath) {
    return new URL(relativePath, window.location.href).href;
  }

  function dataPaths(repoRelative, templatesRelative) {
    return [resolveUrl(repoRelative), resolveUrl(templatesRelative)];
  }

  const PATHS = {
    wf: dataPaths("../data/ifrs17/viz/csm_waterfall.json", "data/ifrs17/viz/csm_waterfall.json"),
    amort: dataPaths("../data/ifrs17/viz/csm_amort_schedule.json", "data/ifrs17/viz/csm_amort_schedule.json"),
    pl: dataPaths("../data/ifrs17/viz/insurance_pl_breakdown.json", "data/ifrs17/viz/insurance_pl_breakdown.json"),
    sen: dataPaths("../data/ifrs17/viz/sensitivity_heatmap.json", "data/ifrs17/viz/sensitivity_heatmap.json"),
    nb: dataPaths("../data/ir/nb_csm_ratio.json", "data/ir/nb_csm_ratio.json"),
    hist: dataPaths("../data/ifrs17/viz/csm_waterfall_history.json", "data/ifrs17/viz/csm_waterfall_history.json"),
  };

  const NB_LOOKUP = {
    삼성화재해상보험: { slug: "samsung_fire", bucket: "non_life" },
    현대해상: { slug: "hyundai_marine", bucket: "non_life" },
    DB손해보험: { slug: "db_insurance", bucket: "non_life" },
    KB손해보험: { slug: "kb_insurance", bucket: "non_life" },
    삼성생명: { slug: "samsung_life", bucket: "life" },
    한화생명: { slug: "hanwha_life", bucket: "life" },
  };

  const charts = { wf: null, amort: null, pl: null, nb: null, hist: null };

  const payload = { wf:null, amort:null, pl:null, sen:null, nb:null, hist:null };
  const ix = {
    wf: new Map(),
    amort: new Map(),
    pl: new Map(),
    sen: new Map(),
    hist: new Map(),
  };

  function parseKoNum(x){
    if (x == null) return null;
    if (x === "" || x === "-") return null;
    let s = String(x).trim();
    let neg = false;
    s = s.replace(/,/g, "");
    if (/^\(.+\)$/.test(s)) { neg=true; s=s.slice(1,-1); }
    const n = Number(String(s).replace(/[^0-9.+-]/g, ""));
    if (Number.isNaN(n)) return null;
    return neg ? -n : n;
  }

  function fmtNum(v, maxFrac){
    if (v == null || v === "") return "-";
    if (typeof v === "number"){
      if (!Number.isFinite(v)) return "-";
      const hasFrac = Math.abs(v % 1) > 1e-9;
      return v.toLocaleString("ko-KR", hasFrac ? { minimumFractionDigits:0, maximumFractionDigits:maxFrac||2 } : {});
    }
    const n = parseKoNum(v);
    return n == null ? String(v) : fmtNum(n, maxFrac);
  }

  function indexRows(rows){
    const m=new Map();
    for (const row of rows || []){
      if (!row || !row.company) continue;
      if (!m.has(row.company)) m.set(row.company, []);
      m.get(row.company).push(row);
    }
    return m;
  }

  function firstRow(m,name){
    const a=m.get(name);
    return (a&&a.length)? a[0] : null;
  }

  function destroyCharts(){
    if (charts.wf){
      try{ charts.wf.dispose(); }catch(e){}
      charts.wf=null;
    }
    for (const k of ["amort","pl","nb","hist"]){
      try{ charts[k] && charts[k].destroy(); }catch(e){}
      charts[k]=null;
    }
  }

  function fetchFirst(paths){
    if (!paths || !paths.length) return Promise.reject(new Error("no paths"));
    const [head, ...rest] = paths;
    return fetch(head).then(r=>{
      if (!r.ok) throw new Error("HTTP "+r.status+" "+head);
      return r.json();
    }).catch(err=> rest.length ? fetchFirst(rest) : Promise.reject(err));
  }

  async function fetchJsonSafe(pathsOrUrl){
    const paths = Array.isArray(pathsOrUrl) ? pathsOrUrl : [pathsOrUrl];
    try{
      return await fetchFirst(paths);
    }catch(e){
      console.warn(e);
      return null;
    }
  }

  function renderWfEcharts(host, wfPay, wfRow){
    const el = q(host, "#chartWf");
    if (!el || typeof echarts === "undefined") return;
    if (charts.wf){
      try{ charts.wf.dispose(); }catch(e){}
    }
    charts.wf = echarts.init(el, null, { renderer: "canvas" });

    const stageOrder = wfPay.stage_order || ["opening","new_business","interest","assumption","amortization","closing"];
    const labelsKo = wfPay.stage_labels_ko || {};
    const labelsEn = wfPay.stage_labels_en || {};
    const xs = stageOrder.map(k=>{
      const a = labelsKo[k] ? String(labelsKo[k]) : String(k);
      const b = labelsEn[k] ? String(labelsEn[k]) : "";
      return b ? (a+"\n"+b) : a;
    });
    const stages = wfRow.stages || {};

    let running = 0;
    const placeholder = [], positive = [], negative = [], totals = [], missing = [];
    stageOrder.forEach((k, idx)=>{
      const stage = stages[k];
      const v = stage && stage.value_mn_krw != null ? Number(stage.value_mn_krw) : null;
      if (idx === 0 || idx === stageOrder.length - 1){
        placeholder.push("-"); positive.push("-"); negative.push("-"); missing.push("-");
        totals.push(v != null && !Number.isNaN(v) ? v : "-");
        if (v != null && !Number.isNaN(v)) running = v;
        return;
      }
      if (v == null || Number.isNaN(v)){
        const hint = Math.max(Math.abs(running) * 0.02, 80000);
        placeholder.push(running);
        positive.push("-"); negative.push("-"); totals.push("-");
        missing.push(hint);
        return;
      }
      missing.push("-");
      if (v >= 0){
        placeholder.push(running); positive.push(v); negative.push("-"); totals.push("-");
        running += v;
      }else{
        placeholder.push(running + v); positive.push("-"); negative.push(-v); totals.push("-");
        running += v;
      }
    });

    charts.wf.setOption({
      backgroundColor: "transparent",
      tooltip: {
        trigger: "axis",
        axisPointer: { type: "shadow" },
        formatter(items){
          const i = items[0].dataIndex;
          const k = stageOrder[i];
          const s = stages[k];
          if (!s || s.value_mn_krw == null) return `<b>${labelsKo[k]||k}</b> · ${labelsEn[k]||""}<br/>data missing`;
          const sign = s.value_mn_krw >= 0 ? "+" : "−";
          const abs = Math.abs(s.value_mn_krw).toLocaleString("ko-KR", { maximumFractionDigits: 0 });
          return `<b>${labelsKo[k]||k}</b> · ${labelsEn[k]||""}<br/>${sign}${abs} 백만원<br/><span style="color:#6c757d">${s.label||""}</span>`;
        },
      },
      grid: { left: 56, right: 20, top: 28, bottom: 72 },
      xAxis: {
        type: "category",
        data: xs,
        axisLabel: { color: "#495057", fontSize: 10, lineHeight: 13 },
        axisLine: { lineStyle: { color: "#dee2e6" } },
      },
      yAxis: {
        type: "value",
        name: "백만원 (mn KRW)",
        nameTextStyle: { color: "#6c757d", fontSize: 11 },
        axisLabel: { color: "#6c757d", formatter: v => (v/1000).toLocaleString("ko-KR")+"k" },
        splitLine: { lineStyle: { color: "#e9ecef" } },
      },
      series: [
        { name: "placeholder", type: "bar", stack: "wf", itemStyle: { color: "transparent" }, emphasis: { disabled: true }, data: placeholder },
        { name: "missing", type: "bar", stack: "wf", itemStyle: { color: "rgba(173,181,189,0.55)" }, data: missing },
        { name: "+", type: "bar", stack: "wf", itemStyle: { color: "#22c55e" }, data: positive,
          label: { show: true, position: "top", color: "#212529", fontSize: 10, formatter: p => p.value === "-" ? "" : Math.round(p.value/1000)+"k" } },
        { name: "−", type: "bar", stack: "wf", itemStyle: { color: "#ef4444" }, data: negative,
          label: { show: true, position: "top", color: "#212529", fontSize: 10, formatter: p => p.value === "-" ? "" : "−"+Math.round(p.value/1000)+"k" } },
        { name: "total", type: "bar", stack: "wf", itemStyle: { color: "#0d6efd" }, data: totals,
          label: { show: true, position: "top", color: "#212529", fontSize: 10, formatter: p => p.value === "-" ? "" : Math.round(p.value/1000).toLocaleString("ko-KR")+"k" } },
      ],
    }, true);
  }

  function heatCss(v, absMax){
    const mx = Math.max(Math.abs(absMax||1), 1e-9)
    const t = Math.max(-1, Math.min(1, Number(v)/mx))
    if (t<=0){
      const u=-t;
      return "rgba(239,68,68,"+(0.10+0.55*u)+")"
    }
    const u=t;
    return "rgba(34,197,94,"+(0.11+0.58*u)+")"
  }

  const NB_LINE_COLORS = ["#0d6efd", "#198754", "#fd7e14", "#6f42c1", "#20c997", "#dc3545"];

  function nbChartData(nbJson, slug, bucket){
    if(!nbJson) return { periods: [], datasets: [] };
    const section = nbJson[bucket];
    if(!section||!section[slug]) return { periods: [], datasets: [] };
    const companySeries = section[slug].series;
    if(!companySeries || typeof companySeries!=="object" || Array.isArray(companySeries)){
      return { periods: [], datasets: [] };
    }

    const periodSet = new Set();
    const seriesList = [];
    for (const [key, sub] of Object.entries(companySeries)){
      if(!sub || !Array.isArray(sub.points) || !sub.points.length) continue;
      const byPeriod = new Map();
      for (const p of sub.points){
        if(!p || p.period==null) continue;
        const period = String(p.period);
        const value = Number(p.value);
        if(!Number.isFinite(value)) continue;
        periodSet.add(period);
        byPeriod.set(period, value);
      }
      if(!byPeriod.size) continue;
      seriesList.push({ key, label: sub.label || key, byPeriod });
    }

    const periods = [...periodSet].sort((a,b)=> String(a).localeCompare(String(b), "ko", {numeric:true}));
    const datasets = seriesList.map((s, idx)=>{
      const color = NB_LINE_COLORS[idx % NB_LINE_COLORS.length];
      const isTotal = s.key === "total";
      return {
        label: s.label,
        data: periods.map(p=> s.byPeriod.has(p) ? s.byPeriod.get(p) : null),
        borderColor: color,
        backgroundColor: color + "18",
        borderWidth: isTotal ? 2.5 : 1.5,
        borderDash: isTotal ? [] : [6, 4],
        pointRadius: isTotal ? 4 : 3,
        tension: 0.25,
        spanGaps: true,
        fill: false,
      };
    });

    return { periods, datasets };
  }

  function mountDash(){
    const host=document.getElementById("dashHost");
    host.innerHTML="";
    const tpl=document.getElementById("dashTpl");
    host.appendChild(tpl.content.cloneNode(true));
    return host;
  }

  function q(host, sel){
    return /** @type {HTMLElement|null}*/(host.querySelector(sel));
  }

  function canvasCtx(host,id){
    const c=/** @type {HTMLCanvasElement|null}*/(q(host,id));
    return c? c.getContext("2d"): null;
  }

  function stub(el, show, msg){
    if(!el) return;
    el.style.display = show?"block":"none";
    if (show && msg!=null) el.textContent = msg;
  }

  function renderCompany(company){
    destroyCharts();
    const host=mountDash();

    const wfPay=payload.wf;
    const wfRow= wfPay ? firstRow(ix.wf, company): null;

    const stageCount = wfRow && wfRow.stages ? Object.keys(wfRow.stages).length : 0;
    const hasWfStages = stageCount > 0;
    const isNoCsm = !!(wfRow && (wfRow.status === "no_csm_columns" || (!hasWfStages && wfRow.status !== "partial" && wfRow.status !== "ok")));
    let wfStubMsg = null;
    if (!wfRow) wfStubMsg = "워터폴 데이터 없음";
    else if (isNoCsm) wfStubMsg = "§14(4) CSM 측정요소 표 없음 — 보험계약마진 열이 추출되지 않았습니다.";
    else if (wfRow.status === "partial") wfStubMsg = "부분 데이터 ("+Math.round((wfRow.completeness||0)*6)+"/6 stages) — 누락 단계는 회색";
    stub(q(host,"#wfStub"), !!wfStubMsg, wfStubMsg);
    q(host,"#wfMeta").textContent = wfRow? ("공시번호 "+String(wfRow.rcept_no||"-")+", 완결도 "+((wfRow.completeness==null)?"-":String(wfRow.completeness))+", 상태 "+String(wfRow.status)) : "";

    if (wfPay && wfRow && hasWfStages){
      renderWfEcharts(host, wfPay, wfRow);
    }else{
      const box = q(host,"#chartWf");
      if (box) box.innerHTML = hasWfStages ? "" : '<div class="placeholder-empty" style="padding:80px 16px">표시할 CSM waterfall 데이터가 없습니다</div>';
    }

    const amortPay=payload.amort;
    const amRow= amortPay ? firstRow(ix.amort, company):null;
    const amortOk = !!(amRow && amRow.status==="ok" && amRow.buckets);
    stub(q(host,"#amortStub"), !amortOk, amRow?("status="+String(amRow.status)):"상각 버킷 없음");
    q(host,"#amortCap").textContent = amortOk && amRow.caption ? String(amRow.caption):"";

    if (amortOk){
      // Yearly schedule (F6): desktop shows next 10 years, mobile next 5.
      // Companies whose source table only has coarse ranges fall back to buckets.
      const ydata = amRow.yearly || {};
      const hasYearly = amRow.granularity === "yearly";
      let labels, data, titleText;
      if (hasYearly){
        const maxY = window.matchMedia("(max-width:640px)").matches ? 5 : 10;
        labels = []; data = [];
        for (let y=1; y<=maxY; y++){
          labels.push(y + "년차");
          const v = ydata["y"+y];
          const n = (v==null) ? NaN : Number(v);
          data.push(Number.isFinite(n) ? n : null);
        }
        titleText = "장래 " + maxY + "년 CSM 상각 예정액 (연도별, 백만원)";
      } else {
        const ord=[["y1","1년이내"],["y1_y3","1–3년"],["y3_y5","3–5년"],["y5_plus","5년 초과"]];
        labels = ord.map(x=>x[1]);
        data = ord.map(([k])=>{const v=(amRow.buckets||{})[k]; const n=v==null?NaN:Number(v); return Number.isFinite(n)?n:null});
        titleText = "버킷별 상각 규모 (연도별 데이터 없음 — 구간)";
      }
      charts.amort=new Chart(canvasCtx(host,"#canvasAmort"),{
        type:"bar",
        data:{ labels, datasets:[{ label:String(amRow.row_label||"CSM amort"), backgroundColor:"rgba(99,102,241,0.65)", data }]},
        options:{responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false}, title:{display:true,text:titleText}}, scales:{y:{beginAtZero:true, ticks:{ callback:(vv)=> vv.toLocaleString("ko-KR") }}}}
      })
    }

    const plPay=payload.pl;
    const plRow= plPay? firstRow(ix.pl,company):null;
    const plOk = !!(plRow && plRow.status==="ok" && Array.isArray(plRow.table))
    stub(q(host,"#plStub"), !plOk, plRow?("status="+String(plRow.status)):"PL 분해 테이블 없음")
    q(host,"#plCap").textContent = plOk && plRow.caption ? String(plRow.caption):""

    if (plOk){
      const lbls=[]; const vals=[];
      for (const rr of plRow.table||[]){
        if(!Array.isArray(rr) || rr.length<2) continue;
        lbls.push(String(rr[0]||"").trim()||"(기타)")
        const lastCell = rr[rr.length-1];
        const lastV = parseKoNum(lastCell);
        vals.push(lastV == null ? 0 : lastV);
      }
      charts.pl=new Chart(canvasCtx(host,"#canvasPl"),{
        type:"bar",
        data:{ labels: lbls, datasets:[{label:"합계열(표의 마지막 열)", data: vals, backgroundColor:"rgba(14,165,233,0.65)"}] },
        options:{ indexAxis:"y", responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, title:{display:true, text:"PL 항목(현재표 합계열)" }}, scales:{x:{ticks:{ callback:(vv)=> vv.toLocaleString("ko-KR") }}}}
      })
    }

    const nbSpec = NB_LOOKUP[company] || null;
    const nbJs = payload.nb;
    q(host,"#nbStub").style.display="none"; q(host,"#nbWrap").style.display="none"; q(host,"#nbStub").textContent="";

    if(!nbSpec){
      q(host,"#nbStub").style.display="block";
      q(host,"#nbStub").textContent = "해당 라인 차트 매핑이 없습니다.(삼성화재해상보험, 현대해상, DB손해보험, KB손해보험, 삼성생명, 한화생명)";
    } else if(!nbJs){
      q(host,"#nbStub").style.display="block";
      q(host,"#nbStub").textContent = "nb_csm_ratio.json 을 불러오지 못했습니다.";
    } else {
      const nbChart = nbChartData(nbJs, nbSpec.slug, nbSpec.bucket);
      if(!nbChart.periods.length || !nbChart.datasets.length){
        q(host,"#nbStub").style.display="block";
        q(host,"#nbStub").textContent = "시계열 포인트가 비어있습니다.";
      } else {
        q(host,"#nbWrap").style.display="block";
        charts.nb=new Chart(canvasCtx(host,"#canvasNb"),{
          type:"line",
          data:{
            labels: nbChart.periods,
            datasets: nbChart.datasets,
          },
          options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{
              legend:{ display: nbChart.datasets.length > 1, position:"top" },
              title:{display:true,text:"NB CSM 비율 (신계약 CSM ÷ 월납월초, IR 공시)" },
              tooltip:{ callbacks:{ label:(ctx)=> `${ctx.dataset.label}: ${fmtNum(Number(ctx.parsed.y),1)}x` } },
            },
            scales:{ y:{ ticks:{ callback:(vv)=> fmtNum(Number(vv),1) + "x" } } }
          },
        })
      }
    }

    const sPick=firstRow(ix.sen,company);
    const scen = (sPick && Array.isArray(sPick.scenarios)) ? sPick.scenarios : [];
    const sOk = !!(sPick && sPick.status==="ok" && scen.length);
    stub(q(host,"#senStub"), !sOk, sPick?("status="+String(sPick.status)+" / 시나리오 없음"):"민감도 데이터 없음");
    q(host,"#senCap").textContent = sPick && sPick.caption ? String(sPick.caption):""
    q(host,"#senTable").innerHTML="";
    if (sOk){
      const deltas = scen.map(z=> Number(z.csm_delta)).filter(Number.isFinite)
      const absMax = deltas.length? Math.max(...deltas.map(Math.abs)) : 1

      const tbl=document.createElement("table"); const thead=document.createElement("thead"); const tr=document.createElement("tr");
      for(const h of ["위험요인","충격","ΔCSM(백만)","손익영향"]) { const th=document.createElement("th"); th.textContent=h; tr.appendChild(th)}
      thead.appendChild(tr); tbl.appendChild(thead); const tbody=document.createElement("tbody")
      for (const row of scen){
        const rr=document.createElement("tr")
        const t1=document.createElement("td"); t1.textContent= row.risk!=null?String(row.risk):"-"
        const t2=document.createElement("td"); t2.textContent= row.shock!=null?String(row.shock):"-"
        const t3=document.createElement("td"); t3.className="num"; const cd = Number(row.csm_delta); t3.textContent=fmtNum(cd,0); t3.style.background=heatCss(cd, absMax)
        const t4=document.createElement("td"); t4.className="num"; t4.textContent=fmtNum(Number(row.pl_impact),0)
        rr.appendChild(t1); rr.appendChild(t2); rr.appendChild(t3); rr.appendChild(t4)
        tbody.appendChild(rr)
      }
      tbl.appendChild(tbody); q(host,"#senTable").appendChild(tbl)
    }

    // ===== Panel 6: CSM 시계열 (13Q) =====
    const histPay = payload.hist;
    const histRow = histPay ? ix.hist.get(company) : null;
    const histStubMsg = (() => {
      if (!histPay) return "csm_waterfall_history.json 을 불러오지 못했습니다.";
      if (!histRow) return "선택사의 historical 데이터 없음 (23사 cohort 외).";
      return null;
    })();
    stub(q(host,"#histStub"), !!histStubMsg, histStubMsg);
    if (histPay && histRow && histRow.periods){
      const periods = histPay.periods || [];
      const closingValues = periods.map(p => {
        const snap = histRow.periods[p];
        if (!snap || (snap.status !== "ok" && snap.status !== "partial")) return null;
        const v = snap.stages && snap.stages.closing && snap.stages.closing.value_mn_krw;
        return (typeof v === "number" && Number.isFinite(v)) ? v / 1e6 : null;  // mn → 조원
      });
      const nbValues = periods.map(p => {
        const snap = histRow.periods[p];
        if (!snap || (snap.status !== "ok" && snap.status !== "partial")) return null;
        const v = snap.stages && snap.stages.new_business && snap.stages.new_business.value_mn_krw;
        return (typeof v === "number" && Number.isFinite(v)) ? v / 1e6 : null;  // mn → 조원
      });
      // Background lines: all OTHER 23사 closing CSM (faded)
      const bgDatasets = [];
      for (const c of (histPay.companies || [])){
        if (!c || !c.company || c.company === company) continue;
        const closing = periods.map(p => {
          const snap = c.periods && c.periods[p];
          if (!snap || snap.status !== "ok") return null;
          const v = snap.stages && snap.stages.closing && snap.stages.closing.value_mn_krw;
          return (typeof v === "number" && Number.isFinite(v)) ? v / 1e6 : null;
        });
        bgDatasets.push({
          label: c.company,
          data: closing,
          borderColor: "rgba(180,180,180,0.35)",
          borderWidth: 1,
          backgroundColor: "transparent",
          pointRadius: 0,
          tension: 0.1,
          spanGaps: false,
          order: 10,
          hidden: false,
          _bg: true,
        });
      }
      charts.hist = new Chart(canvasCtx(host, "#canvasHist"), {
        type: "line",
        data: {
          labels: periods,
          datasets: [
            ...bgDatasets,
            {
              label: company + " · 기말 CSM (조원)",
              data: closingValues,
              borderColor: "rgb(13, 110, 253)",
              backgroundColor: "rgba(13, 110, 253, 0.08)",
              borderWidth: 3,
              pointRadius: 4,
              pointHoverRadius: 6,
              tension: 0.15,
              fill: true,
              spanGaps: false,
              order: 1,
              yAxisID: "y",
            },
            {
              label: company + " · 신계약 CSM (조원)",
              data: nbValues,
              borderColor: "rgb(255, 99, 132)",
              backgroundColor: "transparent",
              borderWidth: 2,
              borderDash: [6, 4],
              pointRadius: 3,
              pointHoverRadius: 5,
              tension: 0.15,
              fill: false,
              spanGaps: false,
              order: 2,
              yAxisID: "y1",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: { display: true, text: "CSM 시계열 (배경 회색선 = 23사, 강조 = " + company + ")" },
            legend: {
              display: true,
              position: "top",
              labels: {
                filter: (item) => {
                  // hide the 22 background lines from legend
                  const ds = item && item.datasetIndex;
                  if (ds == null) return true;
                  const dataset = charts.hist && charts.hist.data.datasets[ds];
                  return dataset && !dataset._bg;
                },
              },
            },
            tooltip: {
              mode: "index",
              intersect: false,
              filter: (ctx) => {
                const ds = ctx.dataset;
                return ds && !ds._bg;  // only show selected company in tooltip
              },
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${fmtNum(ctx.parsed.y, 2)}조`,
              },
            },
          },
          interaction: { mode: "nearest", axis: "x", intersect: false },
          scales: {
            y: {
              type: "linear", position: "left", beginAtZero: false,
              title: { display: true, text: "기말 CSM (조원)", color: "rgb(13, 110, 253)" },
              ticks: { callback: (v) => fmtNum(v, 1) + "조", color: "rgb(13, 110, 253)" },
              grid: { color: "rgba(13, 110, 253, 0.08)" },
            },
            y1: {
              type: "linear", position: "right", beginAtZero: true,
              title: { display: true, text: "신계약 CSM (조원)", color: "rgb(255, 99, 132)" },
              ticks: { callback: (v) => fmtNum(v, 2) + "조", color: "rgb(255, 99, 132)" },
              grid: { drawOnChartArea: false },
            },
            x: { title: { display: true, text: "분기" } },
          },
        },
      });
    }
  }

  function onSelect(){
    const sel=document.getElementById("company");
    const v=sel&&sel.value;
    const dash=document.getElementById("dashHost");
    const hint=document.getElementById("emptyHint");
    if(!v){
      destroyCharts();
      dash.style.display="none"; hint.style.display="block"; dash.innerHTML=""; return;
    }
    dash.style.display="block"; hint.style.display="none";
    renderCompany(v);
  }

  async function boot(){
    const wf=await fetchJsonSafe(PATHS.wf);
    const amort=await fetchJsonSafe(PATHS.amort);
    const plx=await fetchJsonSafe(PATHS.pl);
    const senx=await fetchJsonSafe(PATHS.sen);
    const nbx=await fetchJsonSafe(PATHS.nb);
    const histx=await fetchJsonSafe(PATHS.hist);

    payload.wf=wf; payload.amort=amort; payload.pl=plx; payload.sen=senx; payload.nb=nbx; payload.hist=histx;

    ix.wf = indexRows(wf && wf.companies);
    ix.amort = indexRows(amort && amort.companies);
    ix.pl = indexRows(plx && plx.companies);
    ix.sen = indexRows(senx && senx.companies);
    // hist has a different shape: companies[].periods{period→snap}; index by name
    if (histx && Array.isArray(histx.companies)){
      for (const c of histx.companies){
        if (c && c.company) ix.hist.set(c.company, c);
      }
    }

    const per = wf && (wf.period || wf.unit || wf.source) ? String(wf.period || wf.source || ""):"";
    const line = document.getElementById("wfPeriodLine");
    if (line) line.textContent = per ? ("워터폴 패킷 컨텍스트: "+per) : ""

    const names = wf && Array.isArray(wf.companies)
      ? Array.from(new Set(wf.companies.map(c=>c.company).filter(Boolean))).sort((a,b)=>a.localeCompare(b,"ko"))
      : [];

    const sel=document.getElementById("company");
    for (let i=sel.options.length-1;i>=1;i--) sel.remove(i);
    for (const nm of names){
      const opt=document.createElement("option"); opt.value=nm; opt.textContent=nm; sel.appendChild(opt)
    }
    sel.addEventListener("change", onSelect);
    window.addEventListener("resize", ()=>{ if (charts.wf) charts.wf.resize(); });
    // Re-render on mobile/desktop breakpoint cross so the amort chart switches 5y <-> 10y.
    window.matchMedia("(max-width:640px)").addEventListener("change", ()=>{ if (sel.value) renderCompany(sel.value); });

    // F1: auto-select company from URL param (?company=...). Used by
    // index.html bubble click → IFRS17 cross-nav.
    try {
      const params = new URLSearchParams(window.location.search);
      const wantedRaw = params.get("company");
      if (wantedRaw && names.length){
        const wanted = decodeURIComponent(wantedRaw);
        let pick = names.find(n => n === wanted);
        if (!pick){
          // partial / contains fallback (e.g. "삼성생명보험" ↔ "삼성생명")
          pick = names.find(n => n.includes(wanted) || wanted.includes(n));
        }
        if (pick){
          sel.value = pick;
          onSelect();
        } else {
          const hint=document.getElementById("emptyHint");
          if (hint) hint.textContent = "URL의 회사 '"+wanted+"'를 IFRS17 23-co 코호트에서 찾지 못했어. 위 드롭다운에서 직접 선택해줘.";
        }
      }
    } catch (e) { /* URL parse safe-guard */ }
  }

  boot().catch(()=>{
    const hint=document.getElementById("emptyHint");
    if (hint) hint.textContent="JSON 패치를 불러오지 못했습니다. http 로컬 서버로 파일을 여세요.";
  })
})();

</script>
</body>
</html>
