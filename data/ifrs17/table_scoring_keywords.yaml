# IFRS17 DART-note table-scoring keywords (owner REFACTOR-1/2, 2026-06-13).
#
# Each IFRS17 extractor scores candidate tables by keyword signals. Those
# keyword sets were hardcoded + copy-pasted across src/ifrs17/*_extractor.py.
# Externalised here so a new label variant lands in CONFIG, not Python.
# Loaded by src/ifrs17/scoring.py -> load_scoring("<name>"). Missing keys
# fall back to empty tuples; non-standard keys (block markers etc.) land in
# ScoringConfig.extra. Structural regexes (year-bucket / sub-caption patterns)
# intentionally stay in code, only keyword lists live here.
#
# IMPORTANT: values must stay byte-identical to the extractor's prior constants
# — tests/unit/test_{csm,measurement,insurance_pl_reinsurance}_extractor.py
# assert this (no-regression). EXCEPTION: short_term_markers had a duplicated
# last element ("보험료배분접근법을 적용하는" x2) in the original copy-paste; the
# owner approved collapsing it to one (DEDUP-2) — a no-op for the membership test.
#
# DEDUP-1: lists that were byte-identical across measurement/insurance_pl/
# reinsurance are defined ONCE here as YAML anchors (&name) and referenced (*name)
# so a common variant is edited in ONE place. PyYAML safe_load expands aliases at
# parse time, so each extractor still sees the full list (byte-identical).

# --- shared list definitions (edit a common variant HERE, once) -------------
# NOTE: a few values carry historical OCR-typo spellings ("위허조정"/"위허해제")
# that MATCH the docling MD text — kept byte-identical on purpose. Do not "fix".
_shared:
  # measurement-family column header tokens (measurement/insurance_pl/reinsurance)
  header: &header ["미래 현금흐름", "현재가치 추정치", "미래현금흐름", "위허조정", "보험계약마진", "수정소급", "공정가치", "그 외 보험계약", "합계"]
  # PAA/short-term section markers (DEDUP-2: was 4 with a dup last element)
  short_term_markers: &short_term_markers ["일반", "자동차", "보험료배분접근법을 적용하는"]
  # direct-business (원수) block markers
  direct_block_markers: &direct_block_markers ["원수", "수재(원수", "순보험계약부채", "보험계약부채", "보험계약자산"]
  # reinsurance (출재) block markers
  ri_block_markers: &ri_block_markers ["출재", "재보험", "순재보험", "출재보험"]
  # weak row stubs shared by measurement + reinsurance (insurance_pl differs)
  meas_ri_row_stubs_weak: &meas_ri_row_stubs_weak ["기초", "기말", "경험조정", "위허해제"]

csm:
  caption_primary: ["보험계약마진"]          # _CAPTION_PRIMARY (used as single string)
  caption_verbs: ["상각", "예상", "인식", "향후", "인식시기", "기대상각"]
  negative_topic_words: ["부채변동", "공정가치", "위험조정", "할인율", "현금흐름"]
  total_words: ["계", "합계", "총계", "합 계", "총 계"]

measurement:
  caption_primary: ["측정요소", "변동내역", "보험부채 상세변동", "상세변동내역", "구성요소별"]
  caption_secondary: ["보험부채", "보험계약부채", "원수", "출재"]
  header: *header
  row_stubs_strong: ["기초 순장부금액", "기말 순장부금액", "당기손익으로 인식한 보험계약마진", "신계약효과", "보험서비스결과", "순보험금융손익", "기초 보험계약 순부채", "기초 출재보험계약 순부채", "기말 보험계약 순부채", "보험계약마진 상각"]
  row_stubs_weak: *meas_ri_row_stubs_weak
  short_term_markers: *short_term_markers
  direct_block_markers: *direct_block_markers
  ri_block_markers: *ri_block_markers

insurance_pl:
  caption_primary: ["보험손익", "보험수익", "보험서비스", "서비스결과", "상세내역"]
  caption_secondary: ["상세", "(5)", "원수", "보험손익"]
  header: *header
  row_stubs_strong: ["보험수익", "보험서비스비용", "총 보험서비스결과", "보험서비스결과", "당기손익으로 인식한 보험계약마진", "예상보험금 및 보험서비스비용", "위허해제에 따른 위허조정 변동", "보험서비스수익", "총 보험수익", "총 보험비용", "보험서비스수익 합계", "보험서비스비용 합계"]
  row_stubs_weak: ["보험송취현금흐름", "손실부담계약", "보험금 및 보험서비스비용", "일반보험서비스수익", "일반보험서비스비용", "보험비용"]
  short_term_markers: *short_term_markers
  direct_block_markers: *direct_block_markers
  ri_block_markers: *ri_block_markers

reinsurance:
  caption_primary: ["출재", "재보험", "순재보험", "출재보험"]
  caption_secondary: ["변동내역", "측정요소", "상세변동", "(3)", "(4)"]
  header: *header
  row_stubs_strong: ["기초 재보험계약자산", "기초 재보험계약부채", "기말 재보험계약자산", "재보험료의 배분", "재보험 순원가", "순재보험금융손익", "재보험자 불이행위허", "당기손익으로 인식한 보험계약마진"]
  row_stubs_weak: *meas_ri_row_stubs_weak
  short_term_markers: *short_term_markers
  direct_block_markers: *direct_block_markers
  ri_block_markers: *ri_block_markers

# bs_snapshot (B1) — section 14(1) BS snapshot skim extractor. Bespoke keyword
# sets ride in .extra (no cross-extractor copy-paste). DEDUP: _HEADER_BS_SLICES
# and _ROW_SLICES were byte-identical (장기/일반/자동차/생명) — one anchor here.
bs_snapshot:
  caption_keywords: ["보험계약부채", "자산부채", "현황", "(1)", "보험계약자산및부채", "보험계약자산부채", "재보험계약자산및부채", "보험계약부채(자산)", "보험계약자산(부채)", "재보험계약자산(부채)", "발행한 보험계약", "세부내역", "보고기간종료일", "금액은 다음", "당기말과 전기말"]
  header_bs: ["보험계약부채", "순보험계약부채", "보험계약자산", "재보험계약자산", "재보험계약부채", "순재보험계약자산"]
  header_bs_triple: ["자산", "부채", "합계", "합 계"]
  bs_slices: &bs_slices ["장기", "일반", "자동차", "생명"]
  header_bs_slices: *bs_slices
  row_stubs: ["보험계약부채", "순보험계약부채", "보험계약자산", "재보험계약자산", "재보험계약부채", "순재보험계약자산"]
  row_slices: *bs_slices
  rollforward_markers: ["변동내역", "측정요소", "잔여보장", "발생사고"]

# sensitivity (B5) — assumption values + sensitivity analysis skim extractor.
# Bespoke keyword sets ride in .extra. OCR-typo spellings (보험위허/위허률/
# 잔여보작/비금융위허) MATCH the docling MD text — kept byte-identical. Do not "fix".
sensitivity:
  caption_assumption: ["현행 추정 가정", "계리적 가정", "가정값", "(2)"]
  caption_sensitivity: ["가정민감도", "민감도 분석", "민감도분석", "보험위허"]
  negative: ["금융상품", "수준3", "공정가치"]
  row_assumption: ["위허률", "해약률", "사업비", "할인율", "신뢰수준"]
  row_sensitivity: ["위허률", "해약률", "사업비", "사업비율", "손해율", "당기손익 영향", "잔여보작", "위허률 가정 변경", "해약률 가정 변경"]
  caption_rollforward: ["측정요소", "변동 세부", "변동내역", "미래서비스 관련", "상세변동"]
  row_rollforward: ["당기 최초 인식", "가정변경효과", "보험계약마진 추정의 변경", "물량차이", "기초 순장부금액", "기말 순장부금액"]
  header_rollforward: ["미래현금흐름의 현재가치 추정치", "비금융위허에대한 위허조정"]
