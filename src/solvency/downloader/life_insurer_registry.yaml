# 생명보험사 식별 사전.
# 생명보험협회 ZIP 내부 PDF 파일명에서 회사를 추정하기 위한 키워드 매핑.
#
# 매칭 로직:
#   1) 파일명 정규화 (공백/특수문자 제거, 영문 소문자)
#   2) 키워드 우선순위(긴 것부터)로 substring 검색
#   3) 가장 먼저 일치하는 회사로 매핑 — 1개도 일치 없으면 _unsorted 처리
#
# aliases는 정식명과 별칭(영문/축약/이전 사명 등)을 포함해야 함.
# 회사를 새로 추가할 때 aliases는 항상 긴 것부터 짧은 것 순서로 정렬할 것
# (예: "신한라이프" → "신한"보다 먼저).

insurers:
  - code: KR0068
    dirname: KR0068_한화생명
    aliases: ["한화생명"]

  - code: KR0069
    dirname: KR0069_삼성생명
    aliases: ["삼성생명"]

  - code: KR0070
    dirname: KR0070_에이비엘생명보험
    aliases: ["에이비엘생명", "ABL생명", "ABL"]

  - code: KR0071
    dirname: KR0071_흥국생명보험
    aliases: ["흥국생명"]

  - code: KR0072
    dirname: KR0072_케이디비생명보험
    aliases: ["케이디비생명", "케이디비생명보험", "케이디비생명보험주식회사", "KDB생명", "KDB"]

  - code: KR0073
    dirname: KR0073_교보생명보험
    # 교보라이프플래닛(KR1010)과 충돌 방지 — "교보생명"만 매칭, "라이프플래닛" 별도 처리
    aliases: ["교보생명"]

  - code: KR0074
    dirname: KR0074_라이나생명보험
    aliases: ["라이나생명", "라이나"]

